(function() {
  const AUTH_KEY = 'ai-ledger-admin-auth';
  const HASH = '4b756188d30a1d735ddd721d016e010ab1c26839786e57ecf5a1b8c60789e9d6';
  if (localStorage.getItem(AUTH_KEY) === 'ok') return;
  const pw = prompt('Admin access required. Enter password:');
  if (!pw) { document.location = 'dashboard.html'; return; }
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw)).then(buf => {
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hash === HASH) { localStorage.setItem(AUTH_KEY, 'ok'); }
    else { alert('Incorrect password'); document.location = 'dashboard.html'; }
  });
})();

<script>
let allSources = []; // unified source list
let activeFilter = 'all';

async function loadData() {
  // 1. Load sources registry
  let registry = { sources: [] };
  try {
    const r = await fetch('sources-registry.json?v=' + Date.now());
    registry = await r.json();
  } catch(e) {}

  // 2. Load vault data points (accepted claims with source URLs)
  let vault = { dataPoints: [] };
  try {
    const r = await fetch('vault-data.json?v=' + Date.now());
    vault = await r.json();
  } catch(e) {}

  // 3. Load claim files from index (no guessing filenames)
  let allClaims = [];
  try {
    const idxResp = await fetch('data-updates/index.json?v=' + Date.now());
    if (idxResp.ok) {
      const fileList = await idxResp.json();
      const claimFiles = fileList.filter(f => f.endsWith('.json') && !f.includes('reconciliation') && !f.includes('draft') && !f.includes('approved'));
      const fetches = claimFiles.map(f => fetch('data-updates/' + f).then(r => r.ok ? r.json() : []).catch(() => []));
      const results = await Promise.all(fetches);
      results.forEach(claims => { if (Array.isArray(claims)) allClaims = allClaims.concat(claims); });
    }
  } catch(e) { console.warn('Could not load claim index:', e); }

  // 4. Build unified source map
  const sourceMap = {}; // url → { source info + claims[] }

  // From registry
  registry.sources.forEach(s => {
    const key = normalizeUrl(s.url);
    sourceMap[key] = {
      url: s.url,
      title: s.title,
      type: s.type,
      author: s.author || s.organization || '',
      frequency: s.frequency,
      lastChecked: s.last_checked,
      registryClaims: s.last_claims_count || 0,
      claims: [],
    };
  });

  // From vault data points
  vault.dataPoints.forEach(dp => {
    if (!dp.sourceUrl) return;
    const key = normalizeUrl(dp.sourceUrl);
    if (!sourceMap[key]) {
      sourceMap[key] = { url: dp.sourceUrl, title: '', type: guessType(dp.sourceUrl), author: dp.sourceAuthor || '', frequency: 'one_time', lastChecked: dp.dateAdded, registryClaims: 0, claims: [] };
    }
    if (!sourceMap[key].title && dp.sourceAuthor) sourceMap[key].title = dp.sourceAuthor;
    sourceMap[key].claims.push({
      entity: extractEntity(dp.claim || dp.notes || ''),
      claim: dp.claim || '',
      value: dp.value,
      unit: dp.unit || '',
      valueDisplay: dp.value ? formatValue(dp.value, dp.unit) : '',
      weight: dp.sourceType || 'observation',
      confidence: dp.confidence || '',
      date: dp.dateOfClaim || dp.dateAdded || '',
      status: dp.status || 'accepted',
      metric: dp.metricKey || '',
    });
  });

  // From extracted claims
  allClaims.forEach(c => {
    const url = c.source_url || c.sourceUrl || '';
    if (!url) return;
    const key = normalizeUrl(url);
    if (!sourceMap[key]) {
      sourceMap[key] = { url: url, title: c.source_podcast || c.source_title || '', type: guessType(url), author: c.speaker || '', frequency: 'one_time', lastChecked: c.source_date || c.extracted_at || '', registryClaims: 0, claims: [] };
    }
    if (!sourceMap[key].title && c.source_podcast) sourceMap[key].title = c.source_podcast + (c.source_episode ? ' — ' + c.source_episode.substring(0, 50) : '');
    sourceMap[key].claims.push({
      entity: c.entity || '',
      claim: c.claim || '',
      value: c.value,
      unit: c.unit || '',
      valueDisplay: c.value_display || (c.value ? String(c.value) : ''),
      weight: c.weight || 'indicative',
      confidence: c.confidence || '',
      date: c.source_date || '',
      status: c.dedup_status || 'extracted',
      metric: c.metric || '',
    });
  });

  // Deduplicate claims within each source (by entity + value)
  Object.values(sourceMap).forEach(s => {
    const seen = new Set();
    s.claims = s.claims.filter(c => {
      const key = (c.entity + '|' + c.value + '|' + c.claim.substring(0, 50)).toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  });

  // Convert to array and sort by claim count
  allSources = Object.values(sourceMap).sort((a, b) => b.claims.length - a.claims.length);
  console.log('Source Ledger loaded:', allSources.length, 'sources,', allSources.reduce((s, x) => s + x.claims.length, 0), 'claims');
  console.log('Registry sources:', registry.sources.length, 'Vault points:', vault.dataPoints.length, 'Extracted claims:', allClaims.length);
  if (allSources.length === 0) {
    document.getElementById('ledger').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">No sources found. Check console for errors.</div>';
    return;
  }
  render();
}

function normalizeUrl(url) {
  return (url || '').replace(/^https?:\/\/(www\.)?/, '').replace(/\?.*$/, '').replace(/\/$/, '').toLowerCase();
}

function guessType(url) {
  url = url.toLowerCase();
  if (/substack|latent\.space|allintranscripts/.test(url)) return 'podcast';
  if (/megaphone|anchor\.fm|transistor|libsyn|simplecast|buzzsprout/.test(url)) return 'podcast';
  if (/happyscribe/.test(url)) return 'podcast';
  if (/openrouter|pypistats|api\./.test(url)) return 'api';
  if (/\.pdf/.test(url)) return 'report';
  if (/docs\.google.*presentation/.test(url)) return 'slide';
  if (/twitter\.com|x\.com/.test(url)) return 'social';
  if (/bloomberg|wsj|ft\.com|techcrunch|cnbc/.test(url)) return 'news';
  if (/forbes|gartner|mckinsey/.test(url)) return 'report';
  return 'web';
}

function formatValue(v, unit) {
  if (!v) return '';
  if (unit === '$' || unit === 'USD') {
    if (v >= 1e12) return '$' + (v/1e12).toFixed(1) + 'T';
    if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
    if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
    return '$' + v.toLocaleString();
  }
  return String(v) + (unit ? ' ' + unit : '');
}

function extractEntity(text) {
  const match = text.match(/^([\w\s./()-]+?)[\s:—–-]/);
  return match ? match[1].trim().substring(0, 30) : '';
}

function getTypeBadge(type) {
  const map = {
    podcast: 'badge-podcast', api: 'badge-api', web: 'badge-web',
    report: 'badge-report', news: 'badge-news', manual: 'badge-manual',
    slide: 'badge-slide', social: 'badge-social',
    rss_feed: 'badge-podcast', podcast_feed: 'badge-podcast',
    web_page: 'badge-web', web_scrape: 'badge-api',
    slide_deck: 'badge-slide', pdf_report: 'badge-report',
    news_article: 'badge-news', social_thread: 'badge-social',
  };
  return map[type] || 'badge-web';
}

function getWeightBadge(w) {
  if (w === 'authoritative' || w === 'sworn-affidavit' || w === 'sec-filing') return 'w-authoritative';
  if (w === 'corroborating' || w === 'reporting' || w === 'official' || w === 'earnings-aggregation') return 'w-corroborating';
  return 'w-indicative';
}

function render() {
  const query = (document.getElementById('search').value || '').toLowerCase().trim();

  let filtered = allSources;

  // Type filter
  if (activeFilter !== 'all') {
    filtered = filtered.filter(s => s.type === activeFilter || guessType(s.url) === activeFilter);
  }

  // Search
  if (query) {
    filtered = filtered.filter(s => {
      const text = [s.url, s.title, s.author, ...s.claims.map(c => c.entity + ' ' + c.claim + ' ' + c.metric)].join(' ').toLowerCase();
      return text.includes(query);
    });
  }

  // Stats
  const totalClaims = filtered.reduce((s, x) => s + x.claims.length, 0);
  const withClaims = filtered.filter(s => s.claims.length > 0).length;
  const entities = new Set();
  filtered.forEach(s => s.claims.forEach(c => { if (c.entity) entities.add(c.entity.toLowerCase()); }));

  document.getElementById('stats').innerHTML =
    '<div class="stat">Sources: <strong>' + filtered.length + '</strong></div>' +
    '<div class="stat">With claims: <strong>' + withClaims + '</strong></div>' +
    '<div class="stat">Total claims: <strong>' + totalClaims + '</strong></div>' +
    '<div class="stat">Entities mentioned: <strong>' + entities.size + '</strong></div>';

  // Type filters
  const types = ['all', ...new Set(allSources.map(s => s.type))].filter(Boolean);
  document.getElementById('filters').innerHTML = types.map(t =>
    '<button class="f-btn' + (activeFilter === t ? ' active' : '') + '" onclick="activeFilter=\'' + t + '\';render();">' +
    (t === 'all' ? 'All' : t.replace(/_/g, ' ')) + '</button>'
  ).join('');

  // Render sources
  document.getElementById('ledger').innerHTML = filtered.map((s, i) => {
    const typeBadge = '<span class="badge ' + getTypeBadge(s.type) + '">' + (s.type || 'web').replace(/_/g, ' ') + '</span>';
    const shortUrl = s.url.replace(/^https?:\/\/(www\.)?/, '').substring(0, 50);
    const title = s.title || shortUrl;

    const claimsHtml = s.claims.length > 0
      ? s.claims.map(c =>
          '<div class="claim-row">' +
          '<span class="entity">' + (c.entity || '—') + '</span>' +
          (c.valueDisplay ? ' — <span class="value">' + c.valueDisplay + '</span>' : '') +
          ' <span class="weight ' + getWeightBadge(c.weight) + '">' + c.weight + '</span>' +
          (c.confidence ? ' <span style="font-size:9px;color:var(--text-dim);">' + c.confidence + '</span>' : '') +
          (c.date ? ' <span style="font-size:9px;color:var(--text-dim);">' + c.date + '</span>' : '') +
          '<div style="color:var(--text-dim);margin-top:2px;">' + c.claim.substring(0, 120) + (c.claim.length > 120 ? '...' : '') + '</div>' +
          '</div>'
        ).join('')
      : '<div class="no-claims">No claims extracted from this source yet' + (s.registryClaims > 0 ? ' (registry shows ' + s.registryClaims + ' from previous run)' : '') + '</div>';

    return '<div class="source-card">' +
      '<div class="source-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
        '<div style="flex:1;">' +
          '<div class="source-title">' + title + '</div>' +
          '<a class="source-url" href="' + s.url + '" target="_blank" onclick="event.stopPropagation()">' + shortUrl + '</a>' +
          (s.author ? '<span style="font-size:10px;color:var(--text-dim);margin-left:8px;">' + s.author + '</span>' : '') +
        '</div>' +
        '<div class="source-meta">' +
          typeBadge +
          '<span style="font-size:10px;color:var(--text-dim);">' + (s.frequency || '').replace(/_/g, ' ') + '</span>' +
          '<div class="claims-count"><strong>' + s.claims.length + '</strong> claim' + (s.claims.length !== 1 ? 's' : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="source-detail">' + claimsHtml + '</div>' +
    '</div>';
  }).join('');
}

loadData();
renderTriangulationsPanel();

// wq-086 commit 6 — surface pending soft-park + applied triangulations.
// Pending: data/triangulations-pending.json (claims accepted but not yet
// drained by apply_decisions.py). Applied: every role=triangulates entry
// in entities.json provenance. This is the audit trail for indirect evidence.
async function renderTriangulationsPanel() {
  const panel = document.getElementById('triangulationsPanel');
  if (!panel) return;

  // Load both in parallel — silent failures land cleanly as empty lists.
  const [pendingRes, entitiesRes] = await Promise.all([
    fetch('data/triangulations-pending.json?v=' + Date.now()).then(r => r.ok ? r.json() : []).catch(() => []),
    fetch('entities.json?v=' + Date.now()).then(r => r.ok ? r.json() : null).catch(() => null),
  ]);

  const pending = Array.isArray(pendingRes) ? pendingRes : [];

  // Walk applied triangulations from entities.json provenance.
  const applied = [];
  if (entitiesRes) {
    function walk(label, provBlock) {
      Object.entries(provBlock || {}).forEach(([provKey, prov]) => {
        (prov.claims || []).forEach(c => {
          if (c.role !== 'triangulates') return;
          applied.push({
            entityLabel: label,
            provKey,
            target_node: c.target_node,
            confidence_impact: c.confidence_impact,
            derivation: c.derivation || '',
            source: c.source,
            date: c.date,
            decision_id: c.decision_id,
            model_classified_as: c.model_classified_as || null,
          });
        });
      });
    }
    (entitiesRes.companies || []).forEach(c => walk(c.name || c.slug, c.provenance || {}));
    walk('market_aggregates', (entitiesRes.market_aggregates || {}).provenance || {});
  }

  if (pending.length === 0 && applied.length === 0) {
    panel.innerHTML = '';
    return;
  }

  const impactColor = { strengthens:'#22c55e', widens_range:'#a78bfa', weakens:'#ef4444' };

  function row(rec, isPending) {
    const targets = isPending
      ? (rec.target_nodes || []).join(', ')
      : (rec.target_node || '');
    const impact = isPending
      ? (rec.accepted_confidence_impact || rec.confidence_impact || '')
      : (rec.confidence_impact || '');
    const date = isPending ? (rec.soft_parked_at || '').slice(0, 10) : (rec.date || '');
    const source = isPending
      ? (rec.claim?.speaker || rec.claim?.sourceAuthor || rec.claim?.source_slug || '')
      : (rec.source || '');
    const derivation = isPending
      ? (rec.claim?.triangulation?.derivation || '')
      : (rec.derivation || '');
    const ic = impactColor[impact] || '#a78bfa';
    return '<div style="padding:10px 12px;border-left:2px solid ' + ic + ';background:rgba(139,92,246,0.04);border-radius:4px;margin-bottom:6px;">' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:11px;">' +
        '<span style="font-weight:700;color:' + ic + ';letter-spacing:0.5px;">[' + (impact || '?') + ']</span>' +
        (source ? '<span style="color:var(--text-dim);">' + source + '</span>' : '') +
        (date ? '<span style="color:var(--text-dim);">' + date + '</span>' : '') +
        (rec.entityLabel ? '<span style="color:var(--text-dim);">→ ' + rec.entityLabel + ' · ' + rec.provKey + '</span>' : '') +
      '</div>' +
      (targets ? '<div style="font-size:10px;color:var(--text-dim);margin-top:4px;">targets: <code>' + targets + '</code></div>' : '') +
      (derivation ? '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.5;">' + derivation.slice(0, 240) + (derivation.length > 240 ? '…' : '') + '</div>' : '') +
    '</div>';
  }

  let html = '<h3 style="font-size:14px;font-weight:700;color:#a78bfa;margin-bottom:8px;">Triangulations</h3>';
  if (pending.length > 0) {
    html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">Pending (' + pending.length + ') — soft-parked, awaiting apply_decisions.py drain:</div>';
    html += pending.map(p => row(p, true)).join('');
  }
  if (applied.length > 0) {
    html += '<div style="font-size:11px;color:var(--text-dim);margin:14px 0 6px;">Applied (' + applied.length + ') — written to entities.json provenance:</div>';
    html += applied.map(a => row(a, false)).join('');
  }
  panel.innerHTML = html;
}
</script>
</body>
</html>
