<script>
(function() {
  const AUTH_KEY = 'ai-ledger-admin-auth';
  const HASH = '4b756188d30a1d735ddd721d016e010ab1c26839786e57ecf5a1b8c60789e9d6';
  if (localStorage.getItem(AUTH_KEY) === 'ok') return;
  const pw = prompt('Admin access required. Enter password:');
  if (!pw) { document.location = 'dashboard.html'; return; }
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw)).then(buf => {
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hash === HASH) { localStorage.setItem(AUTH_KEY, 'ok'); }
    else { alert('Incorrect password'); document.location = 'dashboard.html'; }
  });
})();

<style>
  :root { --bg:#0a0e1a; --card:#111827; --card-border:#1e293b; --text:#e2e8f0; --text-dim:#94a3b8; --accent:#3b82f6; --green:#10b981; --orange:#f59e0b; --red:#ef4444; --purple:#8b5cf6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:700px; margin:0 auto; padding:24px; }
  h2 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .desc { font-size:12px; color:var(--text-dim); margin-bottom:20px; }

  label { font-size:11px; color:var(--text-dim); display:block; margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
  input, select { width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--card-border); border-radius:8px; color:var(--text); font-size:13px; outline:none; margin-bottom:12px; }
  input:focus, select:focus { border-color:var(--accent); }
  .btn { padding:10px 24px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { opacity:0.9; }
  .btn-secondary { background:var(--card); color:var(--text-dim); border:1px solid var(--card-border); }
  .status-msg { margin-top:12px; font-size:12px; padding:8px 12px; border-radius:8px; }
  .status-ok { background:rgba(16,185,129,0.08); color:var(--green); border:1px solid rgba(16,185,129,0.2); }
  .classify-box { padding:10px 14px; background:var(--bg); border:1px solid var(--card-border); border-radius:8px; font-size:12px; margin-bottom:12px; display:none; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--green); color:white; padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600; z-index:100; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; }
</style>

<div class="toast" id="toast"></div>

<script src="github-api.js?v=2026-04-28-wq029-p1.6"></script>
<script>
const CLAUDE_KEY = 'ai-ledger-claude-api-key';

function autoClassify() {
  const url = document.getElementById('src-url').value.trim();
  if (!url) { document.getElementById('src-classify').style.display = 'none'; return; }

  const c = classifyUrl(url);
  const el = document.getElementById('src-classify');
  el.style.display = 'block';
  el.innerHTML = 'Type: <strong style="color:var(--text)">' + c.type + '</strong> · Method: <strong style="color:var(--text)">' + c.method + '</strong> · Frequency: <strong style="color:var(--text)">' + c.freq + '</strong>';
}

function classifyUrl(url) {
  let type = 'web_page', method = 'web_extract', freq = 'one_time';
  if (url.includes('docs.google.com/presentation')) { type = 'slide_deck'; method = 'pdf_export'; freq = 'annual'; }
  else if (url.endsWith('.pdf')) { type = 'pdf'; method = 'pdf_export'; }
  else if (url.includes('substack.com')) { type = 'newsletter'; method = 'web_extract'; freq = 'weekly'; }
  else if (url.includes('youtube.com/watch')) { type = 'video'; method = 'youtube_captions'; }
  else if (url.includes('sec.gov')) { type = 'sec_filing'; method = 'web_extract'; freq = 'quarterly'; }
  else if (url.includes('github.com') && url.split('/').length >= 5) { type = 'github_repo'; method = 'api'; freq = 'weekly'; }
  else if (url.includes('/feed') || url.includes('/rss') || url.includes('feeds.')) { type = 'rss_feed'; method = 'podcast_scraper'; freq = 'weekly'; }
  return { type, method, freq };
}

async function fetchPageText(url) {
  // Try fetching via CORS proxy
  try {
    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
    if (!resp.ok) return null;
    const html = await resp.text();
    if (html.length < 200 || html.includes('Just a moment')) return null;
    // Strip HTML to plaintext
    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('script,style,nav,footer,header').forEach(el => el.remove());
    return (doc.body?.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 8000);
  } catch (e) {
    return null;
  }
}

async function extractClaimsViaClaude(text, sourceId, sourceTitle) {
  const apiKey = localStorage.getItem(CLAUDE_KEY);
  if (!apiKey) return { claims: [], error: 'No Claude API key — claims will be extracted by daily scan' };

  const prompt = `Extract ALL specific quantitative claims from this web page. Focus on:
- Revenue figures (ARR, annual revenue, monthly revenue, collected revenue)
- User/customer counts
- Growth rates
- Financial projections, targets, or guidance
- Token volumes, API usage stats
- Funding, valuation
- Cost figures, margins, losses
- Employee counts

For each claim, return a JSON array. Each item:
{
  "claim": "ALWAYS start with the company name, e.g. 'OpenAI ended 2024 with $3.4B revenue' not 'We ended 2024...'",
  "entity": "company name this is about",
  "value": <numeric value — use billions for $B, millions for $M, raw number for counts>,
  "unit": "unit — e.g. $B, $B ARR, %, count, T tokens/day",
  "confidence": "verified|estimated|speculative",
  "dateOfClaim": "YYYY-MM-DD or best guess",
  "tags": ["relevant", "tags"]
}

Return ONLY a valid JSON array. No markdown, no explanation. If no claims found, return [].

PAGE CONTENT:
${text.slice(0, 8000)}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const result = await resp.json();
    let responseText = result.content[0].text.trim();
    if (responseText.startsWith('```')) {
      responseText = responseText.split('```')[1];
      if (responseText.startsWith('json')) responseText = responseText.slice(4);
    }
    const claims = JSON.parse(responseText.trim());
    return { claims: Array.isArray(claims) ? claims : [], error: null };
  } catch (e) {
    return { claims: [], error: 'Claude extraction failed: ' + e.message };
  }
}

async function addSource() {
  const url = document.getElementById('src-url').value.trim();
  if (!url) return;
  if (!GitHubAPI.hasToken()) {
    showStatus('src-status', 'GitHub token not set — go to Settings tab first');
    return;
  }

  let title = document.getElementById('src-title').value.trim();
  const pastedContent = document.getElementById('src-content').value.trim();

  document.getElementById('src-btn').disabled = true;
  document.getElementById('src-progress').style.display = 'block';
  document.getElementById('src-status').innerHTML = '';

  try {
    // Read current sources-registry from GitHub
    const regFile = await GitHubAPI.readFile('sources-registry.json');
    const registry = JSON.parse(regFile.content);

    // Auto-classify
    const c = classifyUrl(url);
    const newId = 'src-' + String(registry.sources.length + 1).padStart(3, '0');
    if (!title) {
      try { title = new URL(url).hostname.replace('www.', ''); } catch(e) { title = url.slice(0, 50); }
    }

    const today = new Date().toISOString().split('T')[0];
    const newSource = {
      id: newId, url, title,
      type: c.type, author: '', organization: '',
      added: today, tags: [],
      extraction_method: c.method, frequency: c.freq,
      next_check: today, last_checked: null, last_claims_count: 0,
      status: 'pending_first_extraction'
    };

    registry.sources.push(newSource);
    const filesToCommit = [{ path: 'sources-registry.json', content: registry }];
    let claimsExtracted = 0;
    let extractMsg = '';

    // Get content: pasted text, or auto-fetch the URL
    let contentText = pastedContent;
    if (!contentText || contentText.length < 50) {
      document.querySelector('#src-progress div:last-child').textContent = 'Fetching page content...';
      contentText = await fetchPageText(url);
    }

    if (contentText && contentText.length > 50) {
      document.querySelector('#src-progress div:last-child').textContent = 'Extracting claims via Claude...';
      const { claims, error } = await extractClaimsViaClaude(contentText, newId, title);

      if (claims.length > 0) {
        // Read current vault-inbox
        const inboxFile = await GitHubAPI.readFile('vault-inbox.json');
        const inbox = JSON.parse(inboxFile.content);
        const dateStr = today.replace(/-/g, '');

        claims.forEach((claim, i) => {
          const claimId = 'extract-' + dateStr + '-' + newId + '-' + (i + 1);
          if (inbox.items.some(item => item.id === claimId)) return;
          inbox.items.push({
            id: claimId,
            claim: claim.claim || '',
            value: claim.value,
            unit: claim.unit || '',
            sourceUrl: url,
            sourceType: url.includes(claim.entity?.toLowerCase().replace(/\s/g,'')) ? 'official' : 'reporting',
            sourceAuthor: claim.entity || title,
            confidence: claim.confidence || 'estimated',
            dateOfClaim: claim.dateOfClaim || today,
            dateAdded: today,
            usedOn: [],
            tags: claim.tags || [],
            notes: 'Auto-extracted from ' + title,
            status: 'pending',
            replaces: null,
            source_id: newId,
            metricKey: null
          });
          claimsExtracted++;
        });

        inbox.lastProcessed = today;
        filesToCommit.push({ path: 'vault-inbox.json', content: inbox });

        newSource.status = 'active';
        newSource.last_checked = today;
        newSource.last_claims_count = claimsExtracted;
        extractMsg = ' — ' + claimsExtracted + ' claim(s) extracted';
      } else {
        extractMsg = error ? ' — ' + error : ' — no claims found in content';
      }
    } else {
      extractMsg = ' — could not fetch page. Claims will be extracted by daily scan';
    }

    // Commit to GitHub
    document.querySelector('#src-progress div:last-child').textContent = 'Committing to GitHub...';
    const result = await GitHubAPI.commitFiles(filesToCommit, 'Add source: ' + title);

    document.getElementById('src-progress').style.display = 'none';
    document.getElementById('src-btn').disabled = false;
    document.getElementById('src-url').value = '';
    document.getElementById('src-title').value = '';
    document.getElementById('src-content').value = '';
    document.getElementById('src-classify').style.display = 'none';

    let msg = 'Added: ' + title + extractMsg;
    if (claimsExtracted > 0) {
      msg += '<br><a href="review.html" style="color:var(--accent);margin-top:8px;display:inline-block;">Go to Review tab to see extracted claims →</a>';
    }
    msg += '<br><a href="' + result.url + '" target="_blank" style="color:var(--text-dim);font-size:10px;margin-top:4px;display:inline-block;">View commit →</a>';
    showStatus('src-status', msg);
    showToast(claimsExtracted > 0 ? claimsExtracted + ' claims extracted' : 'Source added');

  } catch(e) {
    document.getElementById('src-progress').style.display = 'none';
    document.getElementById('src-btn').disabled = false;
    showStatus('src-status', 'Error: ' + e.message);
  }
}

async function addCompany() {
  const name = document.getElementById('co-name').value.trim();
  if (!name) return;
  if (!GitHubAPI.hasToken()) {
    showStatus('co-status', 'GitHub token not set — go to Settings tab first');
    return;
  }

  try {
    // Read current entities from GitHub
    const entFile = await GitHubAPI.readFile('entities.json');
    const entities = JSON.parse(entFile.content);

    const slug = name.toLowerCase().replace(/\s+/g, '-').replace(/\./g, '');
    if (entities.companies.some(c => c.slug === slug)) {
      showStatus('co-status', 'Error: ' + name + ' already exists');
      return;
    }

    const role = document.getElementById('co-role').value;
    const region = document.getElementById('co-region').value.trim();
    const url = document.getElementById('co-url').value.trim();

    entities.companies.push({
      slug, name,
      roles: [role],
      region,
      website: url,
      products: [],
      financials: {},
      current: {}
    });

    const result = await GitHubAPI.commitFiles(
      [{ path: 'entities.json', content: entities }],
      'Add company: ' + name + ' (' + role + ')'
    );

    document.getElementById('co-name').value = '';
    document.getElementById('co-url').value = '';
    document.getElementById('co-region').value = '';
    document.getElementById('co-notes').value = '';
    showStatus('co-status', 'Added: ' + name + ' (' + role + ')' +
      '<br><a href="' + result.url + '" target="_blank" style="color:var(--text-dim);font-size:10px;margin-top:4px;display:inline-block;">View commit →</a>');
    showToast('Company added');

  } catch(e) {
    showStatus('co-status', 'Error: ' + e.message);
  }
}

function showStatus(id, msg) {
  document.getElementById(id).innerHTML = '<div class="status-msg status-ok">' + msg + '</div>';
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
