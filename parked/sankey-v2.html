<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Follow the Dollar: Forward Look — The AI Ledger</title>
<style>
  :root { --bg:#0a0e1a; --card:#111827; --card-border:#1e293b; --text:#e2e8f0; --text-dim:#94a3b8; --accent:#3b82f6; --green:#10b981; --orange:#f59e0b; --red:#ef4444; --purple:#8b5cf6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .nav-bar { display:flex; align-items:center; gap:6px; padding:12px 24px; background:#0f172a; border-bottom:2px solid #1e293b; flex-wrap:wrap; }
  .nav-brand { font-size:15px; font-weight:700; color:#f8fafc; text-decoration:none; margin-right:12px; }
  .nav-brand span { background:linear-gradient(135deg,#3b82f6,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .nav-link { padding:8px 18px; border-radius:8px; background:#1e293b; color:#cbd5e1; text-decoration:none; font-size:13px; font-weight:500; border:1px solid #334155; }
  .nav-link:hover { background:#334155; }
  .container { max-width:1200px; margin:0 auto; padding:32px 24px; }
  h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
  .sub { font-size:14px; color:var(--text-dim); margin-bottom:24px; line-height:1.6; }
  .year-toggle { display:flex; gap:4px; justify-content:center; margin-bottom:24px; }
  .year-btn { padding:10px 28px; border-radius:8px; border:1px solid var(--card-border); background:var(--card); color:var(--text-dim); font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .year-btn:hover { border-color:var(--accent); color:var(--text); }
  .year-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
  .year-btn .proj { font-size:9px; display:block; opacity:0.7; }
  .hero-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .hero-stat { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:16px; text-align:center; }
  .hero-stat .label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); }
  .hero-stat .value { font-size:28px; font-weight:800; margin:4px 0; }
  .hero-stat .detail { font-size:10px; color:var(--text-dim); }
  .sankey-container { position:relative; width:100%; overflow-x:auto; }
  canvas { display:block; }
  .flow-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:20px; }
  .flow-table th { text-align:left; padding:10px 14px; color:var(--text-dim); font-weight:600; border-bottom:2px solid var(--card-border); font-size:11px; text-transform:uppercase; }
  .flow-table td { padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.03); }
  .flow-table tr:hover td { background:rgba(59,130,246,0.03); }
  .card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .card h2 { font-size:16px; margin-bottom:16px; }
  .change-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; }
  .change-up { background:rgba(16,185,129,0.15); color:var(--green); }
  .change-down { background:rgba(239,68,68,0.15); color:var(--red); }
  .proj-badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:9px; font-weight:700; background:rgba(139,92,246,0.15); color:var(--purple); }
  @media(max-width:768px) { .hero-grid { grid-template-columns:repeat(2,1fr); } .year-toggle { flex-wrap:wrap; } }
</style>
</head>
<body>
<nav class="nav-bar">
  <a href="dashboard.html" class="nav-brand"><span>AI Ledger</span></a>
  <a href="sankey.html" class="nav-link">Follow the $</a>
  <a href="timeline.html" class="nav-link">Time Machine</a>
  <a href="openrouter.html" class="nav-link">Live Pricing</a>
  <a href="feed.html" class="nav-link">Weekly Feed</a>
</nav>

<div class="container">
  <h1>Follow the Dollar: Forward Look</h1>
  <div class="sub">How does the AI revenue flow evolve from 2025 to 2027? Toggle between years to see how money shifts across buyers, channels, providers, and outcomes.</div>

  <div class="year-toggle" id="year-toggle"></div>

  <div class="hero-grid" id="hero-stats"></div>

  <div class="card">
    <h2 id="flow-title">Revenue Flow</h2>
    <div class="sankey-container">
      <canvas id="sankey" height="560"></canvas>
    </div>
  </div>

  <div class="card">
    <h2>Flow Detail</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" id="flow-tables"></div>
  </div>

  <div class="card" id="narrative-card">
    <h2>What Changes</h2>
    <div id="narrative"></div>
  </div>
</div>

<script>
let sankeyData = null;
let activeYear = '2025';
const yearColors = { '2025': '#3b82f6', '2026E': '#8b5cf6', '2027E': '#f59e0b' };

async function init() {
  try {
    const resp = await fetch('../data/sankey-projections.json?v=' + Date.now());
    sankeyData = await resp.json();
  } catch(e) {
    document.querySelector('.container').innerHTML += '<div style="color:var(--red);text-align:center;padding:40px;">Error loading data: ' + e.message + '</div>';
    console.error(e);
    return;
  }

  // Build year toggles
  let toggleHtml = '';
  for (const [year, data] of Object.entries(sankeyData)) {
    const isProj = year.includes('E');
    toggleHtml += '<button class="year-btn' + (year === activeYear ? ' active' : '') + '" onclick="switchYear(\'' + year + '\')">' + data.label + (isProj ? '<span class="proj">Projected</span>' : '') + '</button>';
  }
  document.getElementById('year-toggle').innerHTML = toggleHtml;

  renderYear(activeYear);
}

function switchYear(year) {
  activeYear = year;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(sankeyData[year].label)));
  renderYear(year);
}

function renderYear(year) {
  const d = sankeyData[year];
  const prevYear = year === '2026E' ? '2025' : year === '2027E' ? '2026E' : null;
  const prev = prevYear ? sankeyData[prevYear] : null;

  // Hero stats
  const subsidyPct = Math.round(d.vc_subsidy / d.total_system * 100);
  const cashFlow = d.outcomes['Op. Cash Flow'] || d.outcomes['Operating Cash Flow'] || d.outcomes.Margin || 0;
  const cashFlowPct = Math.round(cashFlow / d.total_system * 100);
  const invRatio = prev ? Math.round(d.total_system / d.customer_revenue) : Math.round(250 / d.customer_revenue);

  let heroHtml = '';
  heroHtml += '<div class="hero-stat"><div class="label">Total System</div><div class="value" style="color:var(--accent);">$' + d.total_system + 'B</div>';
  if (prev) heroHtml += '<div class="detail">' + changeBadge(d.total_system, prev.total_system) + ' vs ' + prev.label + '</div>';
  heroHtml += '</div>';

  heroHtml += '<div class="hero-stat"><div class="label">Customer Revenue</div><div class="value" style="color:var(--green);">$' + d.customer_revenue + 'B</div>';
  if (prev) heroHtml += '<div class="detail">' + changeBadge(d.customer_revenue, prev.customer_revenue) + '</div>';
  heroHtml += '</div>';

  heroHtml += '<div class="hero-stat"><div class="label">VC Subsidy</div><div class="value" style="color:var(--red);">$' + d.vc_subsidy + 'B</div><div class="detail">' + subsidyPct + '% of system</div></div>';

  heroHtml += '<div class="hero-stat"><div class="label">Operating Cash Flow</div><div class="value" style="color:' + (cashFlow > 5 ? 'var(--green)' : 'var(--orange)') + ';">$' + cashFlow + 'B</div><div class="detail">' + cashFlowPct + '% of system (pre-capex depreciation)</div></div>';

  document.getElementById('hero-stats').innerHTML = heroHtml;
  document.getElementById('flow-title').textContent = d.label + ' Revenue Flow';

  // Draw Sankey
  drawSankey(d);

  // Flow tables
  let tablesHtml = '';

  // Buyers table
  tablesHtml += '<div><h3 style="font-size:14px;margin-bottom:12px;">Who Pays</h3><table class="flow-table"><thead><tr><th>Buyer</th><th>Value</th>';
  if (prev) tablesHtml += '<th>Change</th>';
  tablesHtml += '</tr></thead><tbody>';
  for (const [name, val] of Object.entries(d.buyers)) {
    tablesHtml += '<tr><td style="font-weight:600;">' + name + '</td><td>$' + val + 'B</td>';
    if (prev && prev.buyers[name] != null) tablesHtml += '<td>' + changeBadge(val, prev.buyers[name]) + '</td>';
    tablesHtml += '</tr>';
  }
  tablesHtml += '</tbody></table></div>';

  // Providers table
  tablesHtml += '<div><h3 style="font-size:14px;margin-bottom:12px;">Providers</h3><table class="flow-table"><thead><tr><th>Provider</th><th>Total</th><th>Customer</th><th>Subsidy</th>';
  if (prev) tablesHtml += '<th>Change</th>';
  tablesHtml += '</tr></thead><tbody>';
  for (const [name, pdata] of Object.entries(d.providers)) {
    tablesHtml += '<tr><td style="font-weight:600;">' + name + '</td><td>$' + pdata.total + 'B</td><td>$' + pdata.customer + 'B</td><td style="color:var(--red);">$' + pdata.subsidy + 'B</td>';
    if (prev && prev.providers[name]) tablesHtml += '<td>' + changeBadge(pdata.total, prev.providers[name].total) + '</td>';
    else if (prev) tablesHtml += '<td><span class="proj-badge">NEW</span></td>';
    tablesHtml += '</tr>';
  }
  tablesHtml += '</tbody></table></div>';

  document.getElementById('flow-tables').innerHTML = tablesHtml;

  // Narrative
  const narratives = {
    '2025': '<p style="font-size:13px;color:var(--text-dim);line-height:1.8;">2025 was the year AI revenue became real — but the operating economics remained brutal. OpenAI and Anthropic generated $12B+ in combined customer revenue, yet both operated at significant losses. The $9.8B VC subsidy funded the gap between what customers paid and what it cost to serve them. Inference alone consumed $14B — more than total customer revenue. The $2.15B in positive operating cash flow belonged entirely to Traditional SaaS vendors and hyperscaler pass-through fees. None of these figures include the $250B+ in AI infrastructure capex being depreciated over 5-6 years — that sits on balance sheets, not in this operating flow.</p>',
    '2026E': '<p style="font-size:13px;color:var(--text-dim);line-height:1.8;">2026 marks the inflection toward operating sustainability. Customer revenue roughly triples to $52B as enterprise adoption moves past pilot stage. OpenAI crosses $20B+ in customer revenue; Anthropic follows at $14B+. Chinese providers (ByteDance, Alibaba, DeepSeek) enter the revenue picture for the first time. The VC subsidy grows in absolute terms ($13B) but shrinks as a share of the system (20% vs 36%). Operating cash flow reaches $8B as inference costs per token continue falling. This cash flow is pre-capex — the industry is still spending $500B+ on infrastructure that will depreciate over years.</p>',
    '2027E': '<p style="font-size:13px;color:var(--text-dim);line-height:1.8;">By 2027, the AI market reaches $130B total system value — 4.8x 2025. Enterprise becomes the dominant buyer ($70B), and the channel mix shifts decisively toward API and platform usage. OpenAI targets $50B ARR (per their own guidance). Operating cash flow reaches $25B (19% of system) as inference efficiency, open model competition, and scale economics compound. The VC subsidy persists ($20B) but shifts from survival funding to growth investment. The key question: when does operating cash flow exceed annual capex depreciation? That is the point of true profitability — and it is not yet on the horizon.</p>',
  };
  document.getElementById('narrative').innerHTML = narratives[year] || '';
}

function changeBadge(current, previous) {
  if (!previous || previous === 0) return '';
  const pct = Math.round((current - previous) / previous * 100);
  const cls = pct >= 0 ? 'change-up' : 'change-down';
  return '<span class="change-badge ' + cls + '">' + (pct >= 0 ? '+' : '') + pct + '%</span>';
}

let sankeyNodes = [];  // stored for hit-testing
let sankeyFlows = [];
let currentSankeyData = null;
let hoveredNode = null;
let lockedNode = null;  // click to lock highlight

const nodeColors = {
  'Consumer': '#f59e0b', 'SME': '#3b82f6', 'Enterprise': '#10b981', 'VC/Investors': '#ef4444',
  'Model Subs': '#60a5fa', 'Model API': '#34d399', 'Hyperscalers': '#a78bfa', 'AI Native Apps': '#f472b6',
  'IaaS & Aggregators': '#8b5cf6', 'IaaS & Open Model': '#8b5cf6', 'Traditional SaaS': '#06b6d4',
  'Hyperscaler Resale': '#a78bfa',
  'OpenAI': '#10a37f', 'Anthropic': '#d97706', 'Google (model)': '#4285f4', 'IaaS/Open': '#8b5cf6',
  'Other Providers': '#475569', 'Trad SaaS': '#06b6d4',
  'Inference': '#ef4444', 'People/SGA': '#f59e0b', 'Op. Cash Flow': '#10b981',
};

function drawSankey(d) {
  currentSankeyData = d;
  const canvas = document.getElementById('sankey');
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth;
  canvas.width = W;
  canvas.height = 560;

  const colW = Math.min(120, W * 0.13);
  const margin = 20;
  const spacing = (W - margin * 2 - colW * 4) / 3;
  const cols = [
    { x: margin, w: colW, label: 'Who Pays', items: Object.entries(d.buyers).map(([n, v]) => ({ name: n, value: v })) },
    { x: margin + colW + spacing, w: colW, label: 'Channels', items: Object.entries(d.channels).map(([n, v]) => ({ name: n, value: v })) },
    { x: margin + (colW + spacing) * 2, w: colW, label: 'Providers', items: Object.entries(d.providers).map(([n, v]) => ({ name: n, value: v.total })) },
    { x: margin + (colW + spacing) * 3, w: colW, label: 'Where It Goes', items: Object.entries(d.outcomes).map(([n, v]) => ({ name: n, value: v })) },
  ];

  const barH = 460;
  const gap = 6;

  // Layout nodes
  sankeyNodes = [];
  cols.forEach((col, ci) => {
    const total = col.items.reduce((s, i) => s + i.value, 0);
    const scale = (barH - (col.items.length - 1) * gap) / total;
    let y = 45;
    col.items.forEach(item => {
      item.h = item.value * scale;
      item.y = y;
      item.col = ci;
      item.colX = col.x;
      item.colW = col.w;
      sankeyNodes.push(item);
      y += item.h + gap;
    });
  });

  // Build flows
  sankeyFlows = [];
  for (let c = 0; c < cols.length - 1; c++) {
    const left = cols[c];
    const right = cols[c + 1];
    const leftTotal = left.items.reduce((s, i) => s + i.value, 0);
    const rightTotal = right.items.reduce((s, i) => s + i.value, 0);
    left.items.forEach(lItem => {
      right.items.forEach(rItem => {
        const rPct = rItem.value / rightTotal;
        const lPct = lItem.value / leftTotal;
        const flowH = Math.min(lItem.h * rPct, rItem.h * lPct) * 0.8;
        if (flowH < 0.5) return;
        const lx = left.x + left.w;
        const rx = right.x;
        const ly = lItem.y + lItem.h * (rItem.y / (right.items[right.items.length-1].y + right.items[right.items.length-1].h));
        const ry = rItem.y + rItem.h * (lItem.y / (left.items[left.items.length-1].y + left.items[left.items.length-1].h));
        sankeyFlows.push({ lItem, rItem, lx, rx, ly, ry, flowH, col: c });
      });
    });
  }

  renderSankey(ctx, W, cols);
}

function renderSankey(ctx, W, cols) {
  ctx.clearRect(0, 0, W, 560);
  const activeNode = lockedNode || hoveredNode;
  const hName = activeNode ? activeNode.name : null;

  // Column headers — bold, prominent
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px -apple-system, sans-serif';
  ctx.fillStyle = '#e2e8f0';
  const colPositions = [
    { x: sankeyNodes.filter(n => n.col === 0)[0]?.colX || 60, w: sankeyNodes.filter(n => n.col === 0)[0]?.colW || 100, label: 'Who Pays' },
    { x: sankeyNodes.filter(n => n.col === 1)[0]?.colX || 200, w: sankeyNodes.filter(n => n.col === 1)[0]?.colW || 100, label: 'Channels' },
    { x: sankeyNodes.filter(n => n.col === 2)[0]?.colX || 400, w: sankeyNodes.filter(n => n.col === 2)[0]?.colW || 100, label: 'Providers' },
    { x: sankeyNodes.filter(n => n.col === 3)[0]?.colX || 600, w: sankeyNodes.filter(n => n.col === 3)[0]?.colW || 100, label: 'Where It Goes' },
  ];
  colPositions.forEach(cp => {
    ctx.fillText(cp.label, cp.x + cp.w / 2, 22);
  });
  // Underline
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  colPositions.forEach(cp => {
    ctx.beginPath();
    ctx.moveTo(cp.x, 28);
    ctx.lineTo(cp.x + cp.w, 28);
    ctx.stroke();
  });
  ctx.textAlign = 'left';

  // Draw flows first (behind nodes)
  sankeyFlows.forEach(f => {
    const connected = hName && (f.lItem.name === hName || f.rItem.name === hName);
    const dimmed = hName && !connected;
    const color = nodeColors[f.lItem.name] || '#475569';
    ctx.globalAlpha = dimmed ? 0.03 : connected ? 0.35 : 0.12;
    ctx.fillStyle = color;
    ctx.beginPath();
    const cp = (f.rx - f.lx) * 0.4;
    ctx.moveTo(f.lx, f.ly);
    ctx.bezierCurveTo(f.lx + cp, f.ly, f.rx - cp, f.ry, f.rx, f.ry);
    ctx.lineTo(f.rx, f.ry + f.flowH);
    ctx.bezierCurveTo(f.rx - cp, f.ry + f.flowH, f.lx + cp, f.ly + f.flowH, f.lx, f.ly + f.flowH);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1.0;
  });

  // Draw nodes
  sankeyNodes.forEach(item => {
    const isHovered = item.name === hName;
    const dimmed = hName && !isHovered && !sankeyFlows.some(f => (f.lItem.name === hName && f.rItem.name === item.name) || (f.rItem.name === hName && f.lItem.name === item.name));
    const color = nodeColors[item.name] || '#475569';

    ctx.globalAlpha = dimmed ? 0.25 : 1.0;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(item.colX, item.y, item.colW, Math.max(item.h, 2), 4);
    ctx.fill();

    if (isHovered) {
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label — fit text to node width
    if (item.h > 12) {
      ctx.fillStyle = 'white';
      const maxLabelW = item.colW - 8;
      const valText = '$' + (item.value < 1 ? item.value.toFixed(1) : Math.round(item.value)) + 'B';

      if (item.h > 28) {
        // Two lines: name on top, value below
        ctx.font = 'bold 9px -apple-system, sans-serif';
        let label = item.name;
        while (ctx.measureText(label).width > maxLabelW && label.length > 3) label = label.slice(0, -1);
        if (label !== item.name) label += '..';
        ctx.fillText(label, item.colX + 4, item.y + item.h / 2 - 2);
        ctx.font = '9px -apple-system, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillText(valText, item.colX + 4, item.y + item.h / 2 + 10);
      } else {
        // Single line: abbreviated name + value
        ctx.font = 'bold 8px -apple-system, sans-serif';
        let label = item.name;
        const valW = ctx.measureText(' ' + valText).width;
        while (ctx.measureText(label).width + valW > maxLabelW && label.length > 2) label = label.slice(0, -1);
        ctx.fillText(label, item.colX + 3, item.y + item.h / 2 + 3);
        ctx.font = '8px -apple-system, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText(valText, item.colX + item.colW - ctx.measureText(valText).width - 3, item.y + item.h / 2 + 3);
      }
    }
    ctx.globalAlpha = 1.0;
  });

  // Tooltip — show proportional flows that sum to the node's value
  if (activeNode) {
    const item = activeNode;

    // Calculate proportional inflows (how much of THIS node's value comes from each source)
    const inFlows = sankeyFlows.filter(f => f.rItem.name === item.name);
    const outFlows = sankeyFlows.filter(f => f.lItem.name === item.name);

    // For inflows: each source contributes proportionally
    const inTotal = inFlows.reduce((s, f) => s + f.lItem.value, 0);
    const inItems = inFlows.map(f => {
      const share = inTotal > 0 ? (f.lItem.value / inTotal) * item.value : 0;
      return { name: f.lItem.name, value: share };
    }).filter(x => x.value > 0.01).sort((a, b) => b.value - a.value);

    // For outflows: each destination receives proportionally
    const outTotal = outFlows.reduce((s, f) => s + f.rItem.value, 0);
    const outItems = outFlows.map(f => {
      const share = outTotal > 0 ? (f.rItem.value / outTotal) * item.value : 0;
      return { name: f.rItem.name, value: share };
    }).filter(x => x.value > 0.01).sort((a, b) => b.value - a.value);

    let tipLines = [item.name + ' — $' + item.value.toFixed(1) + 'B'];
    if (inItems.length) {
      const inSum = inItems.reduce((s, x) => s + x.value, 0);
      tipLines.push('Inflows ($' + inSum.toFixed(1) + 'B):');
      inItems.forEach(x => tipLines.push('  ' + x.name + ': $' + x.value.toFixed(1) + 'B'));
    }
    if (outItems.length) {
      const outSum = outItems.reduce((s, x) => s + x.value, 0);
      tipLines.push('Outflows ($' + outSum.toFixed(1) + 'B):');
      outItems.forEach(x => tipLines.push('  ' + x.name + ': $' + x.value.toFixed(1) + 'B'));
    }

    ctx.font = '10px -apple-system, sans-serif';
    const tipW = Math.min(Math.max(...tipLines.map(l => ctx.measureText(l).width)) + 28, W * 0.4);
    const lineH = 15;
    const tipH = tipLines.length * lineH + 16;

    // Position: try right of node, fall back to left if would overflow
    let tipX = item.colX + item.colW + 14;
    if (tipX + tipW > W - 10) {
      tipX = item.colX - tipW - 14;
    }
    if (tipX < 5) tipX = 5;

    let tipY = Math.max(item.y, 35);
    if (tipY + tipH > 550) tipY = 550 - tipH;

    ctx.fillStyle = 'rgba(15,23,42,0.96)';
    ctx.beginPath();
    ctx.roundRect(tipX, tipY, tipW, tipH, 6);
    ctx.fill();
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 1;
    ctx.stroke();

    tipLines.forEach((line, i) => {
      ctx.fillStyle = i === 0 ? '#f1f5f9' : line.startsWith('  ') ? '#94a3b8' : '#cbd5e1';
      ctx.font = i === 0 ? 'bold 11px -apple-system, sans-serif' : '10px -apple-system, sans-serif';
      ctx.fillText(line, tipX + 10, tipY + 14 + i * lineH);
    });
  }
}

// Mouse interaction
const canvas = document.getElementById('sankey');
canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let found = null;
  for (const node of sankeyNodes) {
    if (mx >= node.colX && mx <= node.colX + node.colW && my >= node.y && my <= node.y + node.h) {
      found = node;
      break;
    }
  }

  if (found !== hoveredNode) {
    hoveredNode = found;
    canvas.style.cursor = found ? 'pointer' : 'default';
    const ctx = canvas.getContext('2d');
    renderSankey(ctx, canvas.width, null);
  }
});

canvas.addEventListener('click', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let found = null;
  for (const node of sankeyNodes) {
    if (mx >= node.colX && mx <= node.colX + node.colW && my >= node.y && my <= node.y + node.h) {
      found = node;
      break;
    }
  }

  if (found && lockedNode && found.name === lockedNode.name) {
    lockedNode = null;  // click same node to unlock
  } else {
    lockedNode = found;  // lock new node, or null to clear
  }

  const ctx = canvas.getContext('2d');
  renderSankey(ctx, canvas.width, null);
});

canvas.addEventListener('mouseleave', function() {
  if (hoveredNode && !lockedNode) {
    hoveredNode = null;
    const ctx = canvas.getContext('2d');
    renderSankey(ctx, canvas.width, null);
  }
});

init();
</script>
</body>
</html>
