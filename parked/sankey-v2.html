<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Follow the Dollar: Forward Look — The AI Ledger</title>
<style>
  :root { --bg:#0a0e1a; --card:#111827; --card-border:#1e293b; --text:#e2e8f0; --text-dim:#94a3b8; --accent:#3b82f6; --green:#10b981; --orange:#f59e0b; --red:#ef4444; --purple:#8b5cf6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .nav-bar { display:flex; align-items:center; gap:6px; padding:12px 24px; background:#0f172a; border-bottom:2px solid #1e293b; flex-wrap:wrap; }
  .nav-brand { font-size:15px; font-weight:700; color:#f8fafc; text-decoration:none; margin-right:12px; }
  .nav-brand span { background:linear-gradient(135deg,#3b82f6,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .nav-link { padding:8px 18px; border-radius:8px; background:#1e293b; color:#cbd5e1; text-decoration:none; font-size:13px; font-weight:500; border:1px solid #334155; }
  .nav-link:hover { background:#334155; }
  .container { max-width:1200px; margin:0 auto; padding:32px 24px; }
  h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
  .sub { font-size:14px; color:var(--text-dim); margin-bottom:24px; line-height:1.6; }
  .year-toggle { display:flex; gap:4px; justify-content:center; margin-bottom:24px; }
  .year-btn { padding:10px 28px; border-radius:8px; border:1px solid var(--card-border); background:var(--card); color:var(--text-dim); font-size:14px; font-weight:600; cursor:pointer; }
  .year-btn:hover { border-color:var(--accent); color:var(--text); }
  .year-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
  .year-btn .proj { font-size:9px; display:block; opacity:0.7; }
  .hero-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .hero-stat { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:16px; text-align:center; }
  .hero-stat .label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); }
  .hero-stat .value { font-size:28px; font-weight:800; margin:4px 0; }
  .hero-stat .detail { font-size:10px; color:var(--text-dim); }
  .card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .card h2 { font-size:16px; margin-bottom:16px; }
  @media(max-width:768px) { .hero-grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<nav class="nav-bar">
  <a href="dashboard.html" class="nav-brand"><span>AI Ledger</span></a>
  <a href="sankey.html" class="nav-link">Follow the $</a>
  <a href="timeline.html" class="nav-link">Time Machine</a>
  <a href="openrouter.html" class="nav-link">Live Pricing</a>
  <a href="feed.html" class="nav-link">Weekly Feed</a>
</nav>
<div class="container">
  <h1>Follow the Dollar: Forward Look</h1>
  <div class="sub">Toggle between years to see how money shifts across buyers, channels, providers, and outcomes.</div>
  <div class="year-toggle" id="year-toggle"></div>
  <div class="hero-grid" id="hero-stats"></div>
  <div class="card">
    <h2 id="flow-title">Revenue Flow</h2>
    <div style="position:relative;width:100%;overflow-x:auto;">
      <canvas id="sankey" height="560"></canvas>
    </div>
    <div id="tooltip-panel" style="min-height:50px;padding:12px 16px;margin-top:8px;background:rgba(15,23,42,0.6);border:1px solid var(--card-border);border-radius:8px;font-size:12px;color:var(--text-dim);">
      <span style="opacity:0.4;">Click or hover a node to see flow details</span>
    </div>
  </div>
  <div class="card" id="narrative-card">
    <h2>What Changes</h2>
    <div id="narrative"></div>
  </div>
</div>

<script>
let sankeyData = null, activeYear = '2025';
let allNodes = [], allFlows = [], lockedNode = null, hoveredNode = null;

const COLORS = {
  'Consumer':'#f59e0b','SME':'#3b82f6','Enterprise':'#10b981','VC/Investors':'#dc2626',
  'Model Subs':'#f59e0b','Model API':'#3b82f6','Hyperscalers':'#06b6d4','AI Native Apps':'#10b981',
  'IaaS & Agg.':'#8b5cf6','Trad. SaaS':'#ef4444',
  'OpenAI':'#10a37f','Anthropic':'#d97706','Google (Gemini)':'#4285f4','IaaS/Open':'#8b5cf6',
  'Other Model Providers':'#475569',
  'Inference':'#ef4444','Other Operating':'#f59e0b','Generated Cashflow':'#10b981',
};

async function init() {
  try {
    const r = await fetch('../data/sankey-projections.json?v=' + Date.now());
    sankeyData = await r.json();
  } catch(e) {
    document.querySelector('.container').innerHTML += '<div style="color:var(--red);text-align:center;padding:40px;">Error: '+e.message+'</div>';
    return;
  }
  let html = '';
  for (const [yr, d] of Object.entries(sankeyData)) {
    html += '<button class="year-btn'+(yr===activeYear?' active':'')+'" onclick="switchYear(\''+yr+'\')">'+d.label+(yr.includes('E')?'<span class=proj>Projected</span>':'')+'</button>';
  }
  document.getElementById('year-toggle').innerHTML = html;
  renderYear(activeYear);
}

function switchYear(yr) {
  activeYear = yr;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(sankeyData[yr].label)));
  lockedNode = null; hoveredNode = null;
  renderYear(yr);
}

function renderYear(yr) {
  const d = sankeyData[yr];
  const prev = yr==='2026E'?sankeyData['2025']:yr==='2027E'?sankeyData['2026E']:null;
  const cf = d.outcomes.find(o=>o.label.includes('Cash'))||d.outcomes[d.outcomes.length-1];

  // Hero stats
  let h = '';
  h += '<div class="hero-stat"><div class="label">Total System</div><div class="value" style="color:var(--accent);">$'+d.totalSystem+'B</div></div>';
  h += '<div class="hero-stat"><div class="label">Customer Revenue</div><div class="value" style="color:var(--green);">$'+d.totalCustomerRevenue+'B</div></div>';
  h += '<div class="hero-stat"><div class="label">VC Subsidy</div><div class="value" style="color:var(--red);">$'+d.totalVCSubsidy+'B</div></div>';
  h += '<div class="hero-stat"><div class="label">Generated Cashflow</div><div class="value" style="color:var(--green);">$'+(cf?cf.value:0)+'B</div></div>';
  document.getElementById('hero-stats').innerHTML = h;
  document.getElementById('flow-title').textContent = d.label + ' Revenue Flow';

  // Build and draw
  buildSankey(d);

  // Narrative
  const narratives = {
    '2025':'<p style="font-size:13px;color:var(--text-dim);line-height:1.8;">2025: The industry generates $17.5B in customer revenue but frontier providers operate at a loss. The $2.9B VC subsidy funds the gap. Generated Cashflow ($2.3B) comes entirely from Hyperscaler and Trad SaaS margins — not from model providers.</p>',
    '2026E':'<p style="font-size:13px;color:var(--text-dim);line-height:1.8;">2026E: Customer revenue triples to $61.5B. VC subsidy shrinks dramatically as providers approach breakeven. IaaS/Open grows as open model adoption accelerates via AI Native Apps.</p>',
    '2027E':'<p style="font-size:13px;color:var(--text-dim);line-height:1.8;">2027E: The industry approaches self-sustainability. VC drops near zero. Generated Cashflow reaches $20B as both channel margins and provider surplus contribute. But this is pre-capex — $250B+ in infrastructure depreciation is not included.</p>',
  };
  document.getElementById('narrative').innerHTML = narratives[yr]||'';
}

function buildSankey(d) {
  const canvas = document.getElementById('sankey');
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth;
  canvas.width = W; canvas.height = 560;

  const colW = Math.min(120, W*0.13);
  const margin = 20;
  const spacing = (W - margin*2 - colW*4) / 3;
  const barH = 450, gap = 5, topY = 50;

  // Build columns
  const colDefs = [
    { label:'Who Pays', items: d.buyers.map(b=>({name:b.label, value:b.value})) },
    { label:'Channels', items: d.channels.map(c=>({name:c.label, value:c.value})) },
    { label:'Model Providers', items: d.providers.map(p=>({name:p.label, value:p.value})) },
    { label:'Where It Goes', items: d.outcomes.map(o=>({name:o.label, value:o.value})) },
  ];

  // Global scale — all columns use same px/$B
  const maxColTotal = Math.max(...colDefs.map(c=>c.items.reduce((s,i)=>s+i.value,0)));
  const scale = (barH - 5*gap) / maxColTotal;

  // Layout nodes
  allNodes = [];
  colDefs.forEach((col, ci) => {
    const colTotal = col.items.reduce((s,i)=>s+i.value,0);
    const colH = colTotal*scale + (col.items.length-1)*gap;
    let y = topY + (barH - colH)/2;
    const x = margin + ci*(colW + spacing);
    col.items.forEach(item => {
      const h = item.value * scale;
      allNodes.push({ name:item.name, value:item.value, x, y, w:colW, h, col:ci, _in:0, _out:0 });
      y += h + gap;
    });
  });

  // Helper: find node
  function N(name, col) { return allNodes.find(n=>n.name===name && (col==null||n.col===col)); }

  // Build explicit flows: [{from, to, value, fromCol, toCol}]
  // Each flow has a dollar value. Visual height = value * scale.
  const flowDefs = [];

  // --- Buyers → Channels (proportional, skip VC) ---
  const custBuyers = allNodes.filter(n=>n.col===0 && n.name!=='VC/Investors');
  const chNodes = allNodes.filter(n=>n.col===1);
  const chTotal = chNodes.reduce((s,n)=>s+n.value,0);
  custBuyers.forEach(buyer => {
    chNodes.forEach(ch => {
      const v = buyer.value * (ch.value / chTotal);
      if(v > 0.01) flowDefs.push({from:buyer.name, to:ch.name, value:v, fc:0, tc:1});
    });
  });

  // --- Channels → Providers (routed, minus margins) ---
  const marginPcts = {'Hyperscalers':0.20, 'Trad. SaaS':0.60};
  const provNodes = allNodes.filter(n=>n.col===2);
  const frontierNodes = provNodes.filter(n=>!n.name.includes('IaaS')&&!n.name.includes('Other'));
  const frontierTotal = frontierNodes.reduce((s,n)=>s+n.value,0);
  const iaasNode = N('IaaS/Open',2);
  const otherNode = N('Other Model Providers',2);

  chNodes.forEach(ch => {
    const mPct = marginPcts[ch.name]||0;
    const pass = ch.value * (1-mPct);

    if(ch.name==='IaaS & Agg.' && iaasNode) {
      flowDefs.push({from:ch.name, to:'IaaS/Open', value:pass, fc:1, tc:2});
    } else if(ch.name==='AI Native Apps') {
      if(iaasNode) flowDefs.push({from:ch.name, to:'IaaS/Open', value:pass*0.3, fc:1, tc:2});
      frontierNodes.forEach(p => {
        flowDefs.push({from:ch.name, to:p.name, value:pass*0.7*(p.value/frontierTotal), fc:1, tc:2});
      });
    } else if((ch.name==='Model API'||ch.name==='Model Subs') && otherNode) {
      const recv = [...frontierNodes, otherNode];
      const rt = recv.reduce((s,n)=>s+n.value,0);
      recv.forEach(p => { flowDefs.push({from:ch.name, to:p.name, value:pass*(p.value/rt), fc:1, tc:2}); });
    } else {
      frontierNodes.forEach(p => {
        flowDefs.push({from:ch.name, to:p.name, value:pass*(p.value/frontierTotal), fc:1, tc:2});
      });
    }

    // Margin → Generated Cashflow (bypass)
    if(mPct > 0) {
      flowDefs.push({from:ch.name, to:'Generated Cashflow', value:ch.value*mPct, fc:1, tc:3, bypass:true});
    }
  });

  // --- VC → loss-making Providers (bypass) ---
  const INFERENCE_PCT = 0.47;
  const oocRates = {
    '2025':{'OpenAI':0.79,'Anthropic':0.65,'Google (Gemini)':0.50,'IaaS/Open':0.45,'Other Model Providers':0.80},
    '2026E':{'OpenAI':0.55,'Anthropic':0.55,'Google (Gemini)':0.48,'IaaS/Open':0.42,'Other Model Providers':0.70},
    '2027E':{'OpenAI':0.48,'Anthropic':0.48,'Google (Gemini)':0.45,'IaaS/Open':0.40,'Other Model Providers':0.60},
  };
  const rates = oocRates[activeYear]||oocRates['2025'];
  const vcNode = N('VC/Investors',0);
  if(vcNode && vcNode.value > 0) {
    const chPass = chNodes.reduce((s,n)=>s+n.value*(1-(marginPcts[n.name]||0)),0);
    const pt = provNodes.reduce((s,n)=>s+n.value,0);
    provNodes.forEach(p => {
      const costPct = INFERENCE_PCT + (rates[p.name]||0.55);
      if(costPct < 1.0) return;
      const share = p.value/pt;
      const chRev = chPass * share;
      const vcNeed = chRev * (costPct - 1.0);
      if(vcNeed > 0.01) flowDefs.push({from:'VC/Investors', to:p.name, value:vcNeed, fc:0, tc:2, bypass:true});
    });
  }

  // --- Providers → Inference + Other Operating ---
  provNodes.forEach(p => {
    const costPct = Math.min(INFERENCE_PCT + (rates[p.name]||0.55), 1.0);
    const infShare = INFERENCE_PCT / costPct;
    flowDefs.push({from:p.name, to:'Inference', value:p.value*infShare, fc:2, tc:3});
    flowDefs.push({from:p.name, to:'Other Operating', value:p.value*(1-infShare), fc:2, tc:3});
  });

  // --- Provider surplus → Generated Cashflow (bypass) ---
  provNodes.forEach(p => {
    const costPct = INFERENCE_PCT + (rates[p.name]||0.55);
    if(costPct >= 1.0) return;
    const surplus = p.value * (1.0 - costPct);
    if(surplus > 0.01) flowDefs.push({from:p.name, to:'Generated Cashflow', value:surplus, fc:2, tc:3, bypass:true});
  });

  // Convert flowDefs to visual flows with Y positions
  // Reset offsets
  allNodes.forEach(n => { n._out = 0; n._in = 0; });

  allFlows = [];
  // Sort: normal flows first, then bypasses (so bypasses draw on top)
  flowDefs.sort((a,b) => (a.bypass?1:0)-(b.bypass?1:0));

  flowDefs.forEach(fd => {
    if(fd.value < 0.01) return;
    const fromNode = N(fd.from, fd.fc);
    const toNode = N(fd.to, fd.tc);
    if(!fromNode || !toNode) return;

    const flowH = fd.value * scale;
    const lx = fromNode.x + fromNode.w;
    const rx = toNode.x;
    const ly = fromNode.y + fromNode._out;
    const ry = toNode.y + toNode._in;
    fromNode._out += flowH;
    toNode._in += flowH;

    allFlows.push({ from:fromNode, to:toNode, lx, rx, ly, ry, flowH, value:fd.value, bypass:fd.bypass });
  });

  renderCanvas(ctx, W);
}

function renderCanvas(ctx, W) {
  ctx.clearRect(0,0,W,560);
  const active = lockedNode || hoveredNode;
  const aName = active ? active.name : null;

  // Column headers
  ctx.textAlign = 'center';
  const labels = ['Who Pays','Channels','Model Providers','Where It Goes'];
  const colTotals = [0,1,2,3].map(c => allNodes.filter(n=>n.col===c).reduce((s,n)=>s+n.value,0));
  [0,1,2,3].forEach(ci => {
    const nodes = allNodes.filter(n=>n.col===ci);
    if(!nodes.length) return;
    const x = nodes[0].x + nodes[0].w/2;
    ctx.font = 'bold 13px -apple-system,sans-serif';
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(labels[ci], x, 18);
    ctx.font = '11px -apple-system,sans-serif';
    ctx.fillStyle = '#64748b';
    ctx.fillText('$'+colTotals[ci].toFixed(1)+'B', x, 33);
    ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(nodes[0].x, 38); ctx.lineTo(nodes[0].x+nodes[0].w, 38); ctx.stroke();
  });
  ctx.textAlign = 'left';

  // Draw flows
  allFlows.forEach(f => {
    const connected = aName && (f.from.name===aName || f.to.name===aName);
    const dimmed = aName && !connected;
    ctx.globalAlpha = dimmed ? 0.03 : connected ? 0.5 : 0.18;
    ctx.fillStyle = COLORS[f.from.name] || '#475569';
    ctx.beginPath();
    const cp = (f.rx - f.lx) * 0.4;
    ctx.moveTo(f.lx, f.ly);
    ctx.bezierCurveTo(f.lx+cp, f.ly, f.rx-cp, f.ry, f.rx, f.ry);
    ctx.lineTo(f.rx, f.ry+f.flowH);
    ctx.bezierCurveTo(f.rx-cp, f.ry+f.flowH, f.lx+cp, f.ly+f.flowH, f.lx, f.ly+f.flowH);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Draw nodes
  allNodes.forEach(n => {
    const isActive = n.name === aName;
    const dimmed = aName && !isActive && !allFlows.some(f=>(f.from.name===aName&&f.to.name===n.name)||(f.to.name===aName&&f.from.name===n.name));
    ctx.globalAlpha = dimmed ? 0.25 : 1;
    ctx.fillStyle = COLORS[n.name] || '#475569';
    ctx.beginPath(); ctx.roundRect(n.x, n.y, n.w, Math.max(n.h,2), 4); ctx.fill();
    if(isActive) { ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke(); }
    if(n.h > 16) {
      ctx.fillStyle = 'white';
      ctx.font = 'bold 9px -apple-system,sans-serif';
      let label = n.name;
      while(ctx.measureText(label).width > n.w-6 && label.length>3) label = label.slice(0,-1);
      ctx.fillText(label, n.x+3, n.y+n.h/2-2);
      ctx.font = '9px -apple-system,sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      const vt = '$'+n.value.toFixed(n.value<10?1:0)+'B';
      ctx.fillText(vt, n.x+3, n.y+n.h/2+10);
    }
    ctx.globalAlpha = 1;
  });

  // Tooltip panel
  const panel = document.getElementById('tooltip-panel');
  if(active && panel) {
    const inflows = allFlows.filter(f=>f.to.name===active.name);
    const outflows = allFlows.filter(f=>f.from.name===active.name);
    let html = '<div style="display:flex;gap:32px;flex-wrap:wrap;">';
    html += '<div><strong style="color:#f1f5f9;font-size:15px;">'+active.name+'</strong><div style="color:var(--accent);font-weight:800;font-size:20px;">$'+active.value.toFixed(1)+'B</div></div>';
    if(inflows.length) {
      const inTotal = inflows.reduce((s,f)=>s+f.value,0);
      html += '<div><div style="font-size:10px;color:var(--green);text-transform:uppercase;font-weight:600;margin-bottom:4px;">Inflows $'+inTotal.toFixed(1)+'B</div>';
      inflows.forEach(f => { html += '<div style="font-size:11px;color:#cbd5e1;">'+f.from.name+': <strong>$'+f.value.toFixed(1)+'B</strong></div>'; });
      html += '</div>';
    }
    if(outflows.length) {
      const outTotal = outflows.reduce((s,f)=>s+f.value,0);
      html += '<div><div style="font-size:10px;color:var(--orange);text-transform:uppercase;font-weight:600;margin-bottom:4px;">Outflows $'+outTotal.toFixed(1)+'B</div>';
      outflows.forEach(f => { html += '<div style="font-size:11px;color:#cbd5e1;">'+f.to.name+': <strong>$'+f.value.toFixed(1)+'B</strong></div>'; });
      html += '</div>';
    }
    html += '</div>';
    panel.innerHTML = html;
  } else if(panel) {
    panel.innerHTML = '<span style="opacity:0.4;">Click or hover a node to see flow details</span>';
  }
}

// Mouse
const canvas = document.getElementById('sankey');
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX-r.left, my = e.clientY-r.top;
  let found = null;
  for(const n of allNodes) { if(mx>=n.x && mx<=n.x+n.w && my>=n.y && my<=n.y+n.h) { found=n; break; } }
  if(found !== hoveredNode) { hoveredNode=found; canvas.style.cursor=found?'pointer':'default'; renderCanvas(canvas.getContext('2d'),canvas.width); }
});
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX-r.left, my = e.clientY-r.top;
  let found = null;
  for(const n of allNodes) { if(mx>=n.x && mx<=n.x+n.w && my>=n.y && my<=n.y+n.h) { found=n; break; } }
  lockedNode = (found && lockedNode && found.name===lockedNode.name) ? null : found;
  renderCanvas(canvas.getContext('2d'),canvas.width);
});
canvas.addEventListener('mouseleave', () => {
  if(hoveredNode && !lockedNode) { hoveredNode=null; renderCanvas(canvas.getContext('2d'),canvas.width); }
});

init();
</script>
</body>
</html>
