<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>github-api.js encoding tests &mdash; wq-029</title>
<style>
  body { font: 13px/1.5 -apple-system, sans-serif; padding: 24px; max-width: 760px; }
  h1 { font: 600 16px -apple-system, sans-serif; margin: 0 0 16px; }
  .case { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; margin: 8px 0; }
  .pass { border-color: #10b981; background: #ecfdf5; }
  .fail { border-color: #ef4444; background: #fef2f2; }
  .summary { font-weight: 600; margin-top: 16px; }
  pre { font: 11px/1.4 ui-monospace, monospace; background: #f7f7f7; padding: 6px 8px; border-radius: 4px; margin: 4px 0 0; overflow-x: auto; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>github-api.js encoding tests &mdash; wq-029</h1>
<p>Open in a browser (file:// is fine, no network calls). Tests exercise the
encoding contract used by <code>_createBlob</code> + <code>readFile</code>
plus the <code>countMojibakeMarkers</code> defensive guard.</p>
<div id="out"></div>
<script src="../github-api.js"></script>
<script>
// _encodeBase64Utf8 / _decodeBase64Utf8 are not exported, so reimplement the
// same algorithms here. If these match what github-api.js does, the live
// commit path is byte-clean.
function encodeBase64Utf8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function decodeBase64Utf8(b64) {
  const binary = atob((b64 || '').replace(/\n/g, ''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

// The exact codepoint sequence a stale pre-14e256a readFile() leaves in JS
// memory when the file on disk holds the UTF-8 bytes of an em-dash (E2 80 94).
const MOJIBAKED_EM_DASH = '\u00e2\u0080\u0094';

const out = document.getElementById('out');
let passes = 0, fails = 0;

function assert(name, cond, detail) {
  const div = document.createElement('div');
  div.className = 'case ' + (cond ? 'pass' : 'fail');
  div.innerHTML = '<strong>' + (cond ? 'PASS' : 'FAIL') + '</strong> &mdash; ' + name;
  if (detail) {
    const pre = document.createElement('pre');
    pre.textContent = detail;
    div.appendChild(pre);
  }
  out.appendChild(div);
  cond ? passes++ : fails++;
}

function codepoints(s) {
  const out = [];
  for (let i = 0; i < s.length; i++) out.push('U+' + s.charCodeAt(i).toString(16).padStart(4, '0').toUpperCase());
  return out.join(' ');
}

// Case 1: clean em-dash round-trips through base64 verbatim.
(() => {
  const original = 'Sacra — Anthropic Deep Dive';
  const b64 = encodeBase64Utf8(original);
  const roundTripped = decodeBase64Utf8(b64);
  // The bytes that get sent over the wire (and stored on GitHub) for the
  // em-dash glyph: should be E2 80 94 (UTF-8), not C3 A2 C2 80 C2 94.
  const wireBytes = new TextEncoder().encode(original);
  const dashBytesAt6 = [wireBytes[6], wireBytes[7], wireBytes[8]];
  const expected = [0xE2, 0x80, 0x94];
  const bytesOk = dashBytesAt6[0] === expected[0] && dashBytesAt6[1] === expected[1] && dashBytesAt6[2] === expected[2];

  assert(
    'Case 1: clean em-dash round-trips identically (codepoint U+2014 preserved, wire bytes E2 80 94)',
    roundTripped === original && bytesOk,
    'original codepoints: ' + codepoints(original.slice(5, 8)) + '\n' +
    'wire bytes [6..8]:    ' + dashBytesAt6.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ') + '\n' +
    'round-trip equal:     ' + (roundTripped === original)
  );
})();

// Case 2: a pre-mojibaked string (as a stale read would produce) round-trips
// verbatim through the new base64 path. We do not double-corrupt; we also do
// not silently un-corrupt. The cure for pre-existing markers is wq-030, not
// this fix.
(() => {
  const mangled = 'Sacra ' + MOJIBAKED_EM_DASH + ' Anthropic Deep Dive';
  const b64 = encodeBase64Utf8(mangled);
  const roundTripped = decodeBase64Utf8(b64);
  // Wire bytes for U+00E2 U+0080 U+0094: each gets its own 2-byte UTF-8
  // encoding, so 6 bytes total: C3 A2 C2 80 C2 94. This is the canonical
  // mojibake byte signature observed in vault-inbox.json at 249cffe.
  const wireBytes = new TextEncoder().encode(mangled);
  const sigStart = 6;
  const sigBytes = Array.from(wireBytes.slice(sigStart, sigStart + 6));
  const expectedSig = [0xC3, 0xA2, 0xC2, 0x80, 0xC2, 0x94];
  const sigOk = sigBytes.every((b, i) => b === expectedSig[i]);

  assert(
    'Case 2: pre-mojibaked input round-trips verbatim (no double-corruption, no silent un-corruption)',
    roundTripped === mangled && sigOk,
    'codepoints in mangled em-dash:  ' + codepoints(MOJIBAKED_EM_DASH) + '\n' +
    'wire bytes (UTF-8 of those):    ' + sigBytes.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ') + '\n' +
    'matches canonical 249cffe sig:  ' + sigOk + ' (expect C3 A2 C2 80 C2 94)\n' +
    'round-trip equal:               ' + (roundTripped === mangled)
  );
})();

// Case 3: defensive guard counts new markers correctly and ignores both
// pre-existing markers AND legitimate U+00E2 (e.g. 'Café' a-circumflex would
// be U+00E9, but U+00E2 'â' shows up in normal French/Portuguese too).
(() => {
  if (!window.GitHubAPI || typeof GitHubAPI.countMojibakeMarkers !== 'function') {
    assert('Case 3: GitHubAPI.countMojibakeMarkers exported', false,
      'GitHubAPI.countMojibakeMarkers not found on window.GitHubAPI');
    return;
  }
  const baseline = {
    items: [
      { id: 'a', sourceAuthor: 'Sacra ' + MOJIBAKED_EM_DASH + ' already mojibaked', notes: '', claim: '' },
      { id: 'b', sourceAuthor: 'Prât-à-Manger — legit accented vowel + clean em-dash', notes: '', claim: '' },
      { id: 'c', sourceAuthor: 'Plain ASCII', notes: '', claim: '' },
    ]
  };
  const baselineCount = GitHubAPI.countMojibakeMarkers(baseline);

  // Simulating writeApproved: only status flips, source strings untouched.
  const cleanCommit = JSON.parse(JSON.stringify(baseline));
  cleanCommit.items[1].status = 'accepted';
  const cleanCount = GitHubAPI.countMojibakeMarkers(cleanCommit);

  // Simulating a regression: a NEW mojibake marker appears on item c.
  const corrupted = JSON.parse(JSON.stringify(baseline));
  corrupted.items[2].sourceAuthor = 'Plain ' + MOJIBAKED_EM_DASH + ' surprise';
  const corruptedCount = GitHubAPI.countMojibakeMarkers(corrupted);

  const baselineOk = baselineCount === 1;       // only item a
  const cleanOk = cleanCount === baselineCount; // status flip changes nothing
  const corruptedOk = corruptedCount === baselineCount + 1; // exactly +1

  assert(
    'Case 3: defensive guard counts new markers, ignores pre-existing, ignores legit U+00E2',
    baselineOk && cleanOk && corruptedOk,
    'baseline (1 pre-existing marker on item a): ' + baselineCount + ' (expect 1)\n' +
    'after status-only flip (no new markers):   ' + cleanCount + ' (expect 1)\n' +
    'after regression on item c (+1 marker):    ' + corruptedCount + ' (expect 2)\n' +
    'item b has legit U+00E2 + clean em-dash:   ' + codepoints(baseline.items[1].sourceAuthor.slice(0, 4)) + ' (expect no marker match)'
  );
})();

// Case 4 (wq-029 P1.6): _stringifyAsciiSafe emits non-ASCII as \uXXXX so
// the JS write path produces byte-identical output to Python's default
// json.dump(ensure_ascii=True). Without this, every Submit flips the file
// from ASCII-escape to raw UTF-8 and the next apply-decisions auto-fire
// flips it back, producing 8000+ line cosmetic diffs. The helper isn't
// exported but its algorithm is replicated here against the same input
// the live writer uses.
(() => {
  function stringifyAsciiSafe(value, indent) {
    return JSON.stringify(value, null, indent).replace(
      /[\u0080-\uffff]/g,
      c => '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0')
    );
  }
  // Clean em-dash, mojibake em-dash, plain ASCII — all should land as
  // \uXXXX escapes in the output, matching what Python writes.
  const sample = {
    items: [
      { id: 'a', sourceAuthor: 'Sacra — Anthropic Deep Dive' },     // U+2014
      { id: 'b', sourceAuthor: 'Sacra ' + MOJIBAKED_EM_DASH + ' x' },// pre-mojibaked
      { id: 'c', sourceAuthor: 'Plain ASCII' },
    ]
  };
  const out = stringifyAsciiSafe(sample, 2);
  const hasCleanEscape = out.indexOf('\\u2014') !== -1;
  const hasMojibakeEscape = out.indexOf('\\u00e2\\u0080\\u0094') !== -1;
  const hasNoLiteralEmDash = out.indexOf('—') === -1;
  // Bytes when this string is encoded as UTF-8 should contain neither
  // E2 80 94 (clean) nor C3 A2 C2 80 C2 94 (mojibake) — only ASCII.
  const wireBytes = new TextEncoder().encode(out);
  let allAscii = true;
  for (let i = 0; i < wireBytes.length; i++) {
    if (wireBytes[i] > 0x7F) { allAscii = false; break; }
  }
  assert(
    'Case 4: _stringifyAsciiSafe produces ASCII-only bytes, escapes both clean and mojibake codepoints',
    hasCleanEscape && hasMojibakeEscape && hasNoLiteralEmDash && allAscii,
    'has \\u2014 escape:                ' + hasCleanEscape + '\n' +
    'has \\u00e2\\u0080\\u0094 escape:      ' + hasMojibakeEscape + '\n' +
    'no literal em-dash glyph:         ' + hasNoLiteralEmDash + '\n' +
    'output is ASCII-only on the wire: ' + allAscii
  );
})();

const summary = document.createElement('div');
summary.className = 'summary';
summary.textContent = (fails === 0 ? 'PASS' : 'FAIL') + ' — ' + passes + '/' + (passes + fails) + ' cases';
summary.style.color = fails === 0 ? '#10b981' : '#ef4444';
out.appendChild(summary);
</script>
</body>
</html>
