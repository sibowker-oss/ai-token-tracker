(function() {
  const AUTH_KEY = 'ai-ledger-admin-auth';
  const HASH = '4b756188d30a1d735ddd721d016e010ab1c26839786e57ecf5a1b8c60789e9d6';
  if (localStorage.getItem(AUTH_KEY) === 'ok') return;
  const pw = prompt('Admin access required. Enter password:');
  if (!pw) { document.location = 'dashboard.html'; return; }
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw)).then(buf => {

<style>
  :root { --bg:#0a0e1a; --card:#111827; --card-border:#1e293b; --text:#e2e8f0; --text-dim:#94a3b8; --accent:#3b82f6; --green:#10b981; --orange:#f59e0b; --red:#ef4444; --purple:#8b5cf6; --cyan:#06b6d4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:1100px; margin:0 auto; padding:24px; }
  h1 { font-size:18px; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  h1 span.tag { background:var(--purple); color:white; font-size:9px; padding:2px 6px; border-radius:4px; text-transform:uppercase; }
  .intro { font-size:12px; color:var(--text-dim); margin-bottom:24px; line-height:1.6; }

  /* Stats */
  .stats-row { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
  .stat-card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:14px 18px; min-width:130px; text-align:center; }
  .stat-value { font-size:28px; font-weight:800; }
  .stat-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
  .stat-green .stat-value { color:var(--green); }
  .stat-orange .stat-value { color:var(--orange); }
  .stat-red .stat-value { color:var(--red); }

  /* Entity blocks */
  .entity-block { background:var(--card); border:1px solid var(--card-border); border-radius:10px; margin-bottom:16px; overflow:hidden; }
  .entity-header { padding:14px 20px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .entity-header:hover { background:rgba(255,255,255,0.02); }
  .entity-name { font-size:15px; font-weight:700; }
  .entity-roles { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .entity-score { display:flex; gap:6px; align-items:center; }
  .score-bar { display:flex; gap:2px; }
  .score-dot { width:10px; height:10px; border-radius:2px; }
  .score-dot.high { background:var(--green); }
  .score-dot.medium { background:var(--orange); }
  .score-dot.low { background:var(--red); }
  .score-dot.none { background:#1e293b; }
  .score-text { font-size:11px; color:var(--text-dim); }

  /* Field rows */
  .entity-fields { display:none; border-top:1px solid var(--card-border); }
  .entity-block.expanded .entity-fields { display:block; }
  .field-row { padding:10px 20px; border-bottom:1px solid rgba(255,255,255,0.03); display:flex; gap:12px; align-items:baseline; font-size:12px; }
  .field-row:last-child { border-bottom:none; }
  .field-row:hover { background:rgba(59,130,246,0.03); }
  .field-key { min-width:180px; color:var(--text-dim); font-weight:500; }
  .field-value { min-width:100px; font-weight:700; color:var(--text); }
  .field-confidence { min-width:60px; }
  .conf-badge { padding:2px 8px; border-radius:4px; font-size:9px; font-weight:700; text-transform:uppercase; }
  .conf-high { background:rgba(16,185,129,0.15); color:var(--green); }
  .conf-medium { background:rgba(245,158,11,0.15); color:var(--orange); }
  .conf-low { background:rgba(239,68,68,0.15); color:var(--red); }
  .conf-unsourced { background:rgba(148,163,184,0.1); color:var(--text-dim); }
  .field-sources { flex:1; font-size:10px; color:var(--text-dim); }
  .field-sources .src-tag { display:inline-block; padding:1px 5px; border-radius:3px; margin:1px 2px; font-size:9px; }
  .src-tag.wt-authoritative { background:rgba(16,185,129,0.1); color:var(--green); }
  .src-tag.wt-corroborating { background:rgba(59,130,246,0.1); color:var(--accent); }
  .src-tag.wt-indicative { background:rgba(148,163,184,0.1); color:var(--text-dim); }

  /* Filter */
  .filters { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-btn { padding:5px 12px; border-radius:6px; border:1px solid var(--card-border); background:transparent; color:var(--text-dim); font-size:11px; cursor:pointer; transition:all 0.15s; }
  .filter-btn:hover { border-color:var(--text-dim); color:var(--text); }
  .filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

  /* Nav removed */ .nav-brand { font-size:13px; margin-right:8px; } }
  footer { text-align:center; padding:20px; font-size:11px; color:#64748b; border-top:1px solid #1e293b; margin-top:40px; }
</style>

<body>

<div class="standalone-bar" id="standalone-bar" style="display:none;padding:8px 16px;background:#0f172a;border-bottom:1px solid #1e293b;font-size:11px;">
  <a href="admin.html" style="color:#3b82f6;text-decoration:none;">Open in Command Centre</a>
</div>
<script>
// Show standalone bar if NOT in an iframe
if (window === window.top) document.getElementById('standalone-bar').style.display = 'block';
</script>

<div class="container">
  <h1>Data Confidence <span class="tag">Beta</span></h1>
  <p class="intro">How well-sourced is every number in the system? Green = multiple quality sources. Orange = single source or estimates only. Red = no source linked. Click any company to see field-level detail.</p>

  <div class="stats-row" id="stats-row"></div>

  <!-- Tabs: Entities / Conflicts / Coverage -->
  <div style="display:flex;gap:4px;margin-bottom:16px;">
    <button class="filter-btn active" id="tab-entities" onclick="switchView('entities')">Entities</button>
    <button class="filter-btn" id="tab-conflicts" onclick="switchView('conflicts')">Conflicts</button>
    <button class="filter-btn" id="tab-coverage" onclick="switchView('coverage')">Source Coverage</button>
    <button class="filter-btn" id="tab-stale" onclick="switchView('stale')">Stale Data</button>
  </div>

  <div style="margin-bottom:12px;">
    <input id="search" type="text" placeholder="Search companies..." oninput="renderCurrentView()" style="width:100%;max-width:400px;padding:8px 14px;background:var(--card);border:1px solid var(--card-border);border-radius:8px;color:var(--text);font-size:13px;outline:none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--card-border)'">
  </div>
  <div class="filters" id="filters"></div>
  <div id="entity-list"></div>
  <div id="conflicts-view" style="display:none;"></div>
  <div id="coverage-view" style="display:none;"></div>
  <div id="stale-view" style="display:none;"></div>
</div>

<footer>AI Ledger v2 Beta</footer>

<script>
let entitiesData = null;
let metricSchema = null;
let vaultInbox = null;
let vaultData = null;
let activeFilter = 'all';
let currentView = 'entities';

async function init() {
  const [ents, schema, inbox, vault] = await Promise.all([
    loadJSON('entities.json'),
    loadJSON('metric-schema.json'),
    loadJSON('vault-inbox.json'),
    loadJSON('vault-data.json')
  ]);
  entitiesData = ents;
  metricSchema = schema;
  vaultInbox = inbox;
  vaultData = vault;
  renderStats();
  renderFilters();
  renderEntities();
}

function switchView(view) {
  currentView = view;
  ['entities', 'conflicts', 'coverage', 'stale'].forEach(v => {
    const el = document.getElementById(v === 'entities' ? 'entity-list' : v + '-view');
    if (el) el.style.display = v === view ? 'block' : 'none';
    const tab = document.getElementById('tab-' + v);
    if (tab) tab.classList.toggle('active', v === view);
  });
  document.getElementById('filters').style.display = view === 'entities' ? 'flex' : 'none';
  renderCurrentView();
}

function renderCurrentView() {
  if (currentView === 'entities') renderEntities();
  else if (currentView === 'conflicts') renderConflicts();
  else if (currentView === 'coverage') renderCoverage();
  else if (currentView === 'stale') renderStaleData();
}

async function loadJSON(path) {
  try {
    const r = await fetch(path + '?v=' + Date.now());
    if (r.ok) return await r.json();
  } catch(e) {}
  return null;
}

function getFieldsForEntity(entity) {
  const fields = [];
  const prov = entity.provenance || {};

  // Helper: find best provenance for a key, with fallbacks
  function findProv(key, field) {
    // Direct match
    if (prov[key]) return prov[key];
    // Try without "current." prefix
    if (key.startsWith('current.') && prov[field]) return prov[field];
    // Try "current.{field}" when looking up bare field
    if (!key.includes('.') && prov['current.' + key]) return prov['current.' + key];
    // For current fields, check if any year has provenance for same field
    if (key.startsWith('current.')) {
      for (const [pk, pv] of Object.entries(prov)) {
        if (pk.endsWith('.' + field) && !pv.needs_source) return pv;
      }
    }
    return null;
  }

  // From financials (by year)
  for (const [year, data] of Object.entries(entity.financials || {})) {
    for (const [field, value] of Object.entries(data)) {
      if (value == null) continue;
      if (typeof value === 'object' && !Array.isArray(value)) {
        // Nested objects (e.g. revenue_by_channel) — expand sub-fields
        for (const [sub, sv] of Object.entries(value)) {
          if (sv == null) continue;
          const key = year + '.' + field + '.' + sub;
          const pe = findProv(key, field + '.' + sub);
          fields.push({
            key, year, field: field + '.' + sub, value: sv,
            confidence: pe?.confidence || 'unsourced',
            claims: pe?.claims || [],
            claim_count: pe?.claim_count || 0
          });
        }
        continue;
      }
      const key = year + '.' + field;
      const pe = findProv(key, field);
      fields.push({
        key, year, field, value,
        confidence: pe?.confidence || 'unsourced',
        claims: pe?.claims || [],
        claim_count: pe?.claim_count || 0
      });
    }
  }

  // From current (non-year-keyed)
  const skipFields = new Set(['color', 'arr_date', 'valuation_date']);
  for (const [field, value] of Object.entries(entity.current || {})) {
    if (value == null || skipFields.has(field)) continue;
    if (typeof value === 'object') continue;
    const alreadyCovered = fields.some(f => f.field === field);
    if (alreadyCovered) continue;

    const key = 'current.' + field;
    const pe = findProv(key, field);
    fields.push({
      key, year: 'current', field, value,
      confidence: pe?.confidence || 'unsourced',
      claims: pe?.claims || [],
      claim_count: pe?.claim_count || 0
    });
  }

  return fields;
}

function renderStats() {
  let totalFields = 0, high = 0, medium = 0, low = 0, unsourced = 0;
  const companiesWithProv = new Set();

  for (const entity of entitiesData?.companies || []) {
    const fields = getFieldsForEntity(entity);
    totalFields += fields.length;
    for (const f of fields) {
      if (f.confidence === 'high') { high++; companiesWithProv.add(entity.slug); }
      else if (f.confidence === 'medium') { medium++; companiesWithProv.add(entity.slug); }
      else if (f.confidence === 'low') low++;
      else unsourced++;
    }
  }

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalFields}</div><div class="stat-label">Data Fields</div></div>
    <div class="stat-card stat-green"><div class="stat-value">${high}</div><div class="stat-label">High Confidence</div></div>
    <div class="stat-card stat-orange"><div class="stat-value">${medium}</div><div class="stat-label">Medium</div></div>
    <div class="stat-card stat-red"><div class="stat-value">${low + unsourced}</div><div class="stat-label">Low / Unsourced</div></div>
    <div class="stat-card"><div class="stat-value">${companiesWithProv.size}</div><div class="stat-label">Entities With Sources</div></div>
  `;
}

function renderFilters() {
  const roles = ['all', ...new Set((entitiesData?.companies || []).flatMap(c => c.roles || []))];
  let html = '';
  roles.forEach(r => {
    const label = r === 'all' ? 'All' : r.replace(/_/g, ' ');
    html += '<button class="filter-btn' + (activeFilter === r ? ' active' : '') + '" onclick="setFilter(\'' + r + '\')">' + label + '</button>';
  });
  // Confidence filters
  ['high', 'medium', 'low', 'unsourced'].forEach(c => {
    html += '<button class="filter-btn' + (activeFilter === 'c:' + c ? ' active' : '') + '" onclick="setFilter(\'c:' + c + '\')" style="margin-left:' + (c === 'high' ? '12px' : '0') + ';">' + c + '</button>';
  });
  document.getElementById('filters').innerHTML = html;
}

function setFilter(f) {
  activeFilter = f;
  renderFilters();
  renderEntities();
}

function renderEntities() {
  let companies = entitiesData?.companies || [];

  // Search filter
  const query = (document.getElementById('search')?.value || '').toLowerCase();
  if (query) {
    companies = companies.filter(c => c.name.toLowerCase().includes(query) || c.slug.toLowerCase().includes(query));
  }

  // Filter by role
  if (activeFilter !== 'all' && !activeFilter.startsWith('c:')) {
    companies = companies.filter(c => (c.roles || []).includes(activeFilter));
  }

  // Filter by confidence (only show entities with at least one field at that level)
  if (activeFilter.startsWith('c:')) {
    const conf = activeFilter.substring(2);
    companies = companies.filter(c => {
      const fields = getFieldsForEntity(c);
      return fields.some(f => f.confidence === conf);
    });
  }

  // Sort: most provenance first, then by name
  companies.sort((a, b) => {
    const pa = Object.keys(a.provenance || {}).length;
    const pb = Object.keys(b.provenance || {}).length;
    if (pa !== pb) return pb - pa;
    return a.name.localeCompare(b.name);
  });

  let html = '';
  companies.forEach(entity => {
    const fields = getFieldsForEntity(entity);
    if (fields.length === 0) return;

    const highCount = fields.filter(f => f.confidence === 'high').length;
    const medCount = fields.filter(f => f.confidence === 'medium').length;
    const lowCount = fields.filter(f => f.confidence === 'low' || f.confidence === 'unsourced').length;

    // Score bar visualization
    let dots = '';
    for (let i = 0; i < Math.min(highCount, 8); i++) dots += '<div class="score-dot high"></div>';
    for (let i = 0; i < Math.min(medCount, 8); i++) dots += '<div class="score-dot medium"></div>';
    for (let i = 0; i < Math.min(lowCount, 5); i++) dots += '<div class="score-dot low"></div>';

    html += '<div class="entity-block" onclick="this.classList.toggle(\'expanded\')">';
    html += '<div class="entity-header">';
    html += '<div><div class="entity-name">' + esc(entity.name) + '</div>';
    html += '<div class="entity-roles">' + (entity.roles || []).join(', ') + ' · ' + fields.length + ' fields</div></div>';
    html += '<div class="entity-score">';
    html += '<div class="score-bar">' + dots + '</div>';
    html += '<span class="score-text">' + highCount + 'H ' + medCount + 'M ' + lowCount + 'L</span>';
    html += '</div></div>';

    // Field detail
    html += '<div class="entity-fields">';
    fields.sort((a, b) => {
      const confOrder = { high: 0, medium: 1, low: 2, unsourced: 3 };
      return (confOrder[a.confidence] ?? 9) - (confOrder[b.confidence] ?? 9);
    });

    fields.forEach(f => {
      html += '<div class="field-row">';
      html += '<span class="field-key">' + esc(f.key) + '</span>';
      html += '<span class="field-value">' + esc(String(f.value)) + '</span>';
      html += '<span class="field-confidence"><span class="conf-badge conf-' + f.confidence + '">' + f.confidence + '</span></span>';
      html += '<span class="field-sources">';
      if (f.claims.length > 0) {
        f.claims.forEach(c => {
          html += '<span class="src-tag wt-' + c.weight + '" title="' + esc(c.claim || '') + '">' + esc(c.id) + ' (' + c.weight[0] + ')</span>';
        });
      } else {
        html += '<span style="color:var(--text-dim);font-style:italic;">no source linked</span>';
      }
      html += '</span>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  if (html === '') {
    html = '<div style="text-align:center;padding:40px;color:var(--text-dim);">No entities match this filter.</div>';
  }

  document.getElementById('entity-list').innerHTML = html;
}

// ===== IMPROVEMENT 1: Multi-source conflict detection =====
function renderConflicts() {
  const query = (document.getElementById('search')?.value || '').toLowerCase();
  const items = (vaultInbox?.items || []).concat(
    (vaultData?.dataPoints || []).map(dp => ({...dp, status: 'accepted', claim: dp.claim}))
  );

  // Group by entity + rough field match
  const byEntityField = {};
  items.forEach(item => {
    if (!item.claim) return;
    const entity = (item.sourceAuthor || item.entity || '').toLowerCase().replace(/[^a-z]/g, '');
    if (!entity || entity.length < 3) return;
    // Extract a rough metric key
    const claim = item.claim.toLowerCase();
    let field = 'general';
    if (claim.includes('arr') || claim.includes('revenue') || claim.includes('$')) field = 'revenue';
    else if (claim.includes('token')) field = 'tokens';
    else if (claim.includes('user') || claim.includes('customer') || claim.includes('subscriber')) field = 'users';
    else if (claim.includes('valuation') || claim.includes('funding')) field = 'funding';
    else if (claim.includes('employee') || claim.includes('headcount')) field = 'employees';
    else if (claim.includes('growth') || claim.includes('%')) field = 'growth';

    const key = entity.slice(0, 15) + '|' + field;
    byEntityField[key] = byEntityField[key] || [];
    byEntityField[key].push(item);
  });

  // Find conflicts (2+ claims for same entity+field with different values)
  let html = '<h2 style="font-size:16px;margin-bottom:16px;">Multi-Source Cross-Reference</h2>';
  html += '<p style="font-size:12px;color:var(--text-dim);margin-bottom:20px;">Claims grouped by entity and metric. Highlights where multiple sources report different values for the same data point.</p>';

  const conflicts = [];
  for (const [key, claims] of Object.entries(byEntityField)) {
    if (claims.length < 2) continue;
    const withValues = claims.filter(c => c.value != null);
    if (withValues.length < 2) continue;
    const values = withValues.map(c => c.value);
    const min = Math.min(...values);
    const max = Math.max(...values);
    if (min === max) continue; // All agree
    const spread = max > 0 ? ((max - min) / max * 100).toFixed(0) : 0;
    conflicts.push({ key, claims: withValues, spread: parseFloat(spread), min, max });
  }

  conflicts.sort((a, b) => b.spread - a.spread);

  if (query) {
    conflicts.filter(c => c.key.toLowerCase().includes(query));
  }

  if (conflicts.length === 0) {
    html += '<div style="text-align:center;padding:40px;color:var(--text-dim);">No conflicts found — all multi-source data points agree.</div>';
  } else {
    html += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">' + conflicts.length + ' potential conflicts found</div>';
    conflicts.forEach(c => {
      const [entity, field] = c.key.split('|');
      const spreadColor = c.spread > 50 ? 'var(--red)' : c.spread > 20 ? 'var(--orange)' : 'var(--green)';
      html += '<div class="entity-block" onclick="this.classList.toggle(\'expanded\')" style="margin-bottom:8px;">';
      html += '<div class="entity-header">';
      html += '<div><div class="entity-name">' + esc(entity) + ' — ' + esc(field) + '</div>';
      html += '<div class="entity-roles">' + c.claims.length + ' sources, values: ' + c.min + ' to ' + c.max + '</div></div>';
      html += '<div class="entity-score"><span style="color:' + spreadColor + ';font-weight:700;font-size:14px;">' + c.spread + '% spread</span></div>';
      html += '</div>';
      html += '<div class="entity-fields">';
      c.claims.forEach(cl => {
        const statusColor = cl.status === 'accepted' ? 'var(--green)' : cl.status === 'declined' ? 'var(--red)' : cl.status === 'parked' ? 'var(--orange)' : 'var(--text-dim)';
        html += '<div class="field-row">';
        html += '<span class="field-key" style="min-width:100px;"><span style="color:' + statusColor + ';">' + (cl.status || 'vault') + '</span></span>';
        html += '<span class="field-value" style="min-width:80px;font-weight:700;">' + cl.value + ' ' + (cl.unit || '') + '</span>';
        html += '<span style="flex:1;font-size:11px;color:var(--text-dim);">' + esc(cl.claim?.slice(0, 120)) + '</span>';
        html += '<span style="font-size:10px;color:var(--text-dim);">' + esc(cl.sourceAuthor || cl.source || '') + '</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
  }

  document.getElementById('conflicts-view').innerHTML = html;
}

// ===== IMPROVEMENT 2: Confidence decay based on data age =====
function renderStaleData() {
  const query = (document.getElementById('search')?.value || '').toLowerCase();
  const now = new Date();
  const DAY_MS = 86400000;

  let html = '<h2 style="font-size:16px;margin-bottom:16px;">Stale Data — Confidence Decay</h2>';
  html += '<p style="font-size:12px;color:var(--text-dim);margin-bottom:20px;">Data points degrade over time. Fields older than 90 days are flagged for re-sourcing. Sorted by staleness.</p>';

  const staleItems = [];
  for (const entity of entitiesData?.companies || []) {
    if (query && !entity.name.toLowerCase().includes(query)) continue;
    const fields = getFieldsForEntity(entity);
    fields.forEach(f => {
      // Try to find the date of the source
      let dataDate = null;
      if (f.claims && f.claims.length > 0) {
        const dates = f.claims.map(c => c.dateOfClaim || c.dateAdded).filter(Boolean);
        if (dates.length > 0) dataDate = dates.sort().pop(); // most recent
      }
      // Fallback: check year in key
      if (!dataDate && f.year && f.year.match(/^\d{4}$/)) {
        dataDate = f.year + '-12-31';
      }
      if (!dataDate) dataDate = '2025-01-01'; // assume old if no date

      const age = Math.floor((now - new Date(dataDate)) / DAY_MS);
      let decayLevel = 'fresh'; // < 30 days
      if (age > 180) decayLevel = 'stale';
      else if (age > 90) decayLevel = 'aging';
      else if (age > 30) decayLevel = 'ok';

      if (age > 60) { // Only show items older than 60 days
        staleItems.push({
          entity: entity.name,
          slug: entity.slug,
          roles: entity.roles,
          field: f.field,
          value: f.value,
          confidence: f.confidence,
          dataDate,
          age,
          decayLevel,
        });
      }
    });
  }

  staleItems.sort((a, b) => b.age - a.age);

  if (staleItems.length === 0) {
    html += '<div style="text-align:center;padding:40px;color:var(--text-dim);">All data is less than 60 days old.</div>';
  } else {
    const staleCount = staleItems.filter(i => i.decayLevel === 'stale').length;
    const agingCount = staleItems.filter(i => i.decayLevel === 'aging').length;
    html += '<div style="display:flex;gap:12px;margin-bottom:16px;">';
    html += '<div class="stat-card stat-red"><div class="stat-value">' + staleCount + '</div><div class="stat-label">Stale (>180d)</div></div>';
    html += '<div class="stat-card stat-orange"><div class="stat-value">' + agingCount + '</div><div class="stat-label">Aging (>90d)</div></div>';
    html += '</div>';

    html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">Showing ' + staleItems.length + ' fields older than 60 days</div>';

    let currentEntity = '';
    staleItems.forEach(item => {
      if (item.entity !== currentEntity) {
        if (currentEntity) html += '</div>';
        currentEntity = item.entity;
        html += '<div class="entity-block" style="margin-bottom:8px;">';
        html += '<div class="entity-header" onclick="this.parentElement.classList.toggle(\'expanded\')">';
        html += '<div><div class="entity-name">' + esc(item.entity) + '</div>';
        html += '<div class="entity-roles">' + (item.roles || []).join(', ') + '</div></div>';
        const entityStale = staleItems.filter(s => s.entity === item.entity);
        const worstAge = Math.max(...entityStale.map(s => s.age));
        const ageColor = worstAge > 180 ? 'var(--red)' : worstAge > 90 ? 'var(--orange)' : 'var(--text-dim)';
        html += '<span style="color:' + ageColor + ';font-size:12px;font-weight:600;">' + worstAge + ' days old</span>';
        html += '</div>';
        html += '<div class="entity-fields">';
      }

      const ageColor = item.age > 180 ? 'var(--red)' : item.age > 90 ? 'var(--orange)' : 'var(--text-dim)';
      html += '<div class="field-row">';
      html += '<span class="field-key">' + esc(item.field) + '</span>';
      html += '<span class="field-value">' + esc(String(item.value)) + '</span>';
      html += '<span class="field-confidence"><span class="conf-badge conf-' + item.confidence + '">' + item.confidence + '</span></span>';
      html += '<span style="color:' + ageColor + ';font-size:11px;font-weight:600;">' + item.age + ' days</span>';
      html += '<span style="font-size:10px;color:var(--text-dim);">' + esc(item.dataDate) + '</span>';
      html += '</div>';
    });
    if (currentEntity) html += '</div></div>';
  }

  document.getElementById('stale-view').innerHTML = html;
}

// ===== IMPROVEMENT 3: Source coverage scoring =====
function renderCoverage() {
  const query = (document.getElementById('search')?.value || '').toLowerCase();

  // Key fields by role that we WANT to have authoritative sources for
  const keyFields = {
    model_provider: ['arr', 'collected_revenue', 'tokens_per_day', 'valuation', 'total_funding', 'growth_rate', 'customer_count', 'employees', 'operating_loss'],
    ai_app: ['arr', 'valuation', 'total_funding', 'user_count', 'customer_count', 'employee_count'],
    hyperscaler: ['ai_cloud_revenue', 'gpu_capacity', 'gpu_capex'],
    neo_cloud: ['arr', 'valuation', 'total_funding', 'gpu_count'],
    iaas_provider: ['arr', 'valuation', 'tokens_per_day'],
    aggregator: ['arr', 'tokens_per_day', 'user_count'],
    traditional_saas: ['ai_arr', 'paid_seats'],
    gpu_provider: ['total_revenue', 'data_center_revenue', 'market_share_pct'],
  };

  let html = '<h2 style="font-size:16px;margin-bottom:16px;">Source Coverage Scorecard</h2>';
  html += '<p style="font-size:12px;color:var(--text-dim);margin-bottom:20px;">For each entity, shows what % of key fields have data and how well-sourced they are. Target: every model provider should have 3+ authoritative fields.</p>';

  const scores = [];
  for (const entity of entitiesData?.companies || []) {
    if (query && !entity.name.toLowerCase().includes(query)) continue;

    const allData = {...(entity.current || {})};
    for (const yearData of Object.values(entity.financials || {})) {
      if (typeof yearData === 'object') Object.assign(allData, yearData);
    }

    const fields = getFieldsForEntity(entity);
    const roles = entity.roles || [];
    let targetFields = [];
    roles.forEach(r => { targetFields = targetFields.concat(keyFields[r] || []); });
    targetFields = [...new Set(targetFields)];

    const filled = targetFields.filter(f => allData[f] != null && allData[f] !== 0).length;
    const authFields = fields.filter(f => f.confidence === 'high').length;
    const totalFields = fields.length;
    const coveragePct = targetFields.length > 0 ? Math.round(filled / targetFields.length * 100) : 0;
    const authPct = totalFields > 0 ? Math.round(authFields / totalFields * 100) : 0;

    scores.push({
      name: entity.name,
      slug: entity.slug,
      roles,
      targetFields: targetFields.length,
      filledFields: filled,
      missingFields: targetFields.filter(f => !allData[f] || allData[f] === 0),
      totalFields,
      authFields,
      coveragePct,
      authPct,
    });
  }

  // Sort: model providers first, then by coverage ascending (worst first)
  const rolePriority = {model_provider: 0, hyperscaler: 1, gpu_provider: 2, neo_cloud: 3, iaas_provider: 4, aggregator: 5, ai_app: 6, traditional_saas: 7};
  scores.sort((a, b) => {
    const pa = Math.min(...a.roles.map(r => rolePriority[r] ?? 99));
    const pb = Math.min(...b.roles.map(r => rolePriority[r] ?? 99));
    if (pa !== pb) return pa - pb;
    return a.coveragePct - b.coveragePct;
  });

  // Summary stats
  const avgCoverage = scores.length > 0 ? Math.round(scores.reduce((s, x) => s + x.coveragePct, 0) / scores.length) : 0;
  const wellSourced = scores.filter(s => s.authFields >= 3).length;
  html += '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">';
  html += '<div class="stat-card"><div class="stat-value">' + avgCoverage + '%</div><div class="stat-label">Avg Coverage</div></div>';
  html += '<div class="stat-card stat-green"><div class="stat-value">' + wellSourced + '</div><div class="stat-label">Well-Sourced (3+ auth)</div></div>';
  html += '<div class="stat-card stat-red"><div class="stat-value">' + (scores.length - wellSourced) + '</div><div class="stat-label">Needs Work</div></div>';
  html += '</div>';

  scores.forEach(s => {
    const barColor = s.coveragePct >= 70 ? 'var(--green)' : s.coveragePct >= 40 ? 'var(--orange)' : 'var(--red)';
    const authColor = s.authPct >= 50 ? 'var(--green)' : s.authPct >= 20 ? 'var(--orange)' : 'var(--red)';

    html += '<div class="entity-block" style="margin-bottom:6px;" onclick="this.classList.toggle(\'expanded\')">';
    html += '<div class="entity-header">';
    html += '<div style="flex:1;"><div class="entity-name">' + esc(s.name) + '</div>';
    html += '<div class="entity-roles">' + s.roles.join(', ') + ' · ' + s.filledFields + '/' + s.targetFields + ' key fields</div></div>';

    // Coverage bar
    html += '<div style="display:flex;align-items:center;gap:12px;">';
    html += '<div style="width:120px;height:8px;background:#1e293b;border-radius:4px;overflow:hidden;">';
    html += '<div style="width:' + s.coveragePct + '%;height:100%;background:' + barColor + ';border-radius:4px;"></div></div>';
    html += '<span style="font-size:12px;font-weight:700;color:' + barColor + ';min-width:35px;">' + s.coveragePct + '%</span>';
    html += '<span style="font-size:10px;color:' + authColor + ';">' + s.authFields + ' auth</span>';
    html += '</div></div>';

    // Expanded: show missing fields
    if (s.missingFields.length > 0) {
      html += '<div class="entity-fields">';
      html += '<div class="field-row" style="color:var(--red);font-size:11px;font-weight:600;">Missing key fields:</div>';
      s.missingFields.forEach(f => {
        html += '<div class="field-row"><span class="field-key">' + esc(f) + '</span><span style="color:var(--red);font-size:11px;">no data</span></div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  document.getElementById('coverage-view').innerHTML = html;
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
