<title>Source Ledger — AI Ledger</title>
<script>
(function() {
  const AUTH_KEY = 'ai-ledger-admin-auth';
  const HASH = '4b756188d30a1d735ddd721d016e010ab1c26839786e57ecf5a1b8c60789e9d6';
  if (localStorage.getItem(AUTH_KEY) === 'ok') return;
  const pw = prompt('Admin access required. Enter password:');
  if (!pw) { document.location = 'dashboard.html'; return; }
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw)).then(buf => {
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hash === HASH) { localStorage.setItem(AUTH_KEY, 'ok'); }
    else { alert('Incorrect password'); document.location = 'dashboard.html'; }
  });
})();

<style>
  :root { --bg:#0a0e1a; --card:#111827; --card-border:#1e293b; --text:#e2e8f0; --text-dim:#94a3b8; --accent:#3b82f6; --green:#10b981; --orange:#f59e0b; --red:#ef4444; --purple:#8b5cf6; --cyan:#06b6d4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:1100px; margin:0 auto; padding:24px; }
  h1 { font-size:18px; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  h1 span.tag { background:var(--red); color:white; font-size:9px; padding:2px 6px; border-radius:4px; text-transform:uppercase; }
  .intro { font-size:12px; color:var(--text-dim); margin-bottom:20px; }

  /* Stats */
  .stats-row { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
  .stat-card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:12px 18px; min-width:120px; }
  .stat-value { font-size:22px; font-weight:700; }
  .stat-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

  /* Search */
  .search-bar { position:relative; margin-bottom:20px; }
  .search-bar input { width:100%; padding:12px 16px 12px 40px; background:var(--card); border:1px solid var(--card-border); border-radius:10px; color:var(--text); font-size:14px; outline:none; }
  .search-bar input:focus { border-color:var(--accent); }
  .search-bar input::placeholder { color:var(--text-dim); }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-dim); }

  /* Quick Add */
  .quick-add { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:14px 18px; margin-bottom:24px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .quick-add input { flex:1; min-width:200px; padding:8px 14px; background:var(--bg); border:1px solid var(--card-border); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
  .quick-add input:focus { border-color:var(--accent); }
  .quick-add button { padding:8px 18px; border-radius:8px; border:none; background:var(--accent); color:white; font-size:13px; font-weight:600; cursor:pointer; }
  .quick-add button:hover { opacity:0.9; }
  .quick-add-label { font-size:12px; color:var(--text-dim); font-weight:600; }

  /* Source cards */
  .source-card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:16px 20px; margin-bottom:12px; cursor:pointer; transition:all 0.15s; }
  .source-card:hover { border-color:var(--accent); }
  .source-card.expanded { border-color:var(--accent); }
  .source-card.highlighted { border-color:var(--purple); box-shadow:0 0 0 2px rgba(139,92,246,0.2); }

  .source-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .source-title { font-size:14px; font-weight:700; }
  .source-org { font-size:12px; color:var(--text-dim); margin-top:2px; }
  .source-url-small { font-size:10px; color:var(--accent); text-decoration:none; word-break:break-all; margin-top:3px; display:block; }
  .source-url-small:hover { text-decoration:underline; }
  .source-badges { display:flex; gap:4px; flex-shrink:0; flex-wrap:wrap; align-items:center; }

  /* Action buttons next to Delete */
  .card-action { padding:2px 8px; border-radius:4px; font-size:10px; cursor:pointer; opacity:0.7; transition:opacity 0.15s; background:transparent; }
  .card-action:hover { opacity:1; }
  .card-action[disabled] { opacity:0.3; cursor:not-allowed; }
  .card-action-review { border:1px solid rgba(245,158,11,0.4); color:var(--orange); text-decoration:none; }
  .card-action-extract { border:1px solid rgba(59,130,246,0.4); color:var(--accent); }
  .card-action-delete { border:1px solid rgba(239,68,68,0.3); color:var(--red); margin-left:4px; }

  .badge { display:inline-block; padding:2px 7px; border-radius:5px; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
  .badge-active { background:rgba(16,185,129,0.15); color:var(--green); }
  .badge-pending { background:rgba(245,158,11,0.15); color:var(--orange); }
  .badge-type { background:rgba(59,130,246,0.12); color:var(--accent); }
  .badge-freq { background:rgba(139,92,246,0.12); color:var(--purple); }
  .badge-claims { background:rgba(6,182,212,0.12); color:var(--cyan); }

  .source-meta { display:flex; gap:16px; margin-top:8px; font-size:11px; color:var(--text-dim); flex-wrap:wrap; }

  .source-tags { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
  .source-tag { padding:2px 8px; border-radius:10px; background:rgba(59,130,246,0.08); color:var(--accent); font-size:10px; }

  /* Chip filter row */
  .chip-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:14px; background:transparent; border:1px solid var(--card-border); color:var(--text-dim); font-size:12px; cursor:pointer; transition:border-color 0.15s,color 0.15s,background 0.15s; user-select:none; }
  .chip:hover { border-color:var(--accent); color:var(--text); }
  .chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .chip .chip-count { font-size:10px; opacity:0.75; }
  .chip.active .chip-count { opacity:1; }

  /* Per-card Monitoring block */
  .monitoring-block { margin-top:10px; padding:10px 12px; background:var(--bg); border:1px solid var(--card-border); border-radius:8px; font-size:11px; }
  .mon-row { display:flex; gap:10px; align-items:flex-start; margin-bottom:4px; }
  .mon-row:last-child { margin-bottom:0; }
  .mon-label { color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.4px; font-size:9px; min-width:62px; padding-top:2px; flex-shrink:0; }
  .mon-value { color:var(--text); flex:1; line-height:1.4; }
  .mon-status { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
  .mon-status-healthy { background:rgba(16,185,129,0.15); color:var(--green); }
  .mon-status-stale { background:rgba(245,158,11,0.15); color:var(--orange); }
  .mon-status-overdue { background:rgba(239,68,68,0.15); color:var(--red); }
  .mon-status-never { background:rgba(239,68,68,0.15); color:var(--red); }
  .mon-status-manual { background:rgba(148,163,184,0.15); color:var(--text-dim); }
  .mon-status-event { background:rgba(139,92,246,0.15); color:var(--purple); }
  .mon-dates { color:var(--text-dim); font-size:10px; margin-left:6px; }

  @media (max-width: 600px) {
    .mon-row { flex-direction:column; gap:2px; margin-bottom:8px; }
    .mon-label { min-width:0; padding-top:0; }

  /* Expanded detail */
  .source-detail { display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--card-border); }
  .source-card.expanded .source-detail { display:block; }

  .claims-section-title { font-size:12px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }

  .linked-claim { padding:8px 12px; background:var(--bg); border:1px solid var(--card-border); border-radius:8px; margin-bottom:6px; font-size:12px; }
  .linked-claim .lc-claim { color:var(--text); line-height:1.5; }
  .linked-claim .lc-meta { font-size:10px; color:var(--text-dim); margin-top:4px; }
  .linked-claim .lc-value { color:var(--accent); font-weight:700; }
  .linked-claim .lc-status { font-weight:600; }
  .lc-accepted { color:var(--green); }
  .lc-pending { color:var(--orange); }
  .lc-declined { color:var(--red); }

  .no-claims { font-size:12px; color:var(--text-dim); font-style:italic; padding:8px 0; }

  /* Nav removed — shown via admin.html */ .nav-link { font-size:11px; padding:6px 12px; } .nav-brand { font-size:13px; margin-right:8px; } }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--green); color:white; padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600; z-index:100; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; }

  footer { text-align:center; padding:20px; font-size:11px; color:#64748b; border-top:1px solid #1e293b; margin-top:40px; }
</style>

<script>
// --- wq-104 constant maps (brief §3) ---
// §3.1 type → display label
const TYPE_LABELS = {

  pdf: 'PDF Report',

// §3.2 extraction_method → human description
// Brief §3.2 locks 7 entries; remainder (wq-104 §3.2 extension, 2026-05-14) added
// to cover all extraction_methods present in sources-registry.json today.
// See deploy record for full list.
const EXTRACTION_DESCRIPTIONS = {
  // Brief §3.2 (locked)
  pdf_export: 'PDF exported and parsed on update.',
  podcast_scraper: 'RSS polled; episodes downloaded, transcribed, and parsed for claims.',
  signal_scraper: 'Page scraped for live metric snapshots on each cycle.',
  web_extract: 'Page fetched on cadence; text extracted and claims parsed.',
  api: 'API polled; structured records ingested directly.',
  youtube_captions: 'Captions fetched; transcript parsed for claims.',
  manual: 'Manually added; no automatic re-check.',
  // Extension (wq-104, 2026-05-14)
  rss_feed: 'RSS feed polled; new entries fetched and parsed for claims.',
  ir_page_extract: 'Investor relations page scraped; press releases and disclosures parsed for claims.',
  manual_import: 'Manually imported; no automatic re-check.',

  iso_queue_caiso: 'CAISO interconnection queue ingested; new project rows parsed for claims.',
  eia_api: 'U.S. Energy Information Administration API polled; energy data points ingested.',
  neso_tec: 'UK National Grid ESO transmission entry capacity register polled.',
  epoch_frontier: 'Epoch AI frontier model dataset polled; new model entries ingested.',
  patentsview_search: 'USPTO PatentsView API queried; relevant patents ingested.',
  google_patents_bq: 'Google Patents BigQuery dataset queried; relevant patents ingested.',
  epo_ops: 'European Patent Office Open Patent Services queried; relevant patents ingested.',
  dol_lca_xlsx: 'U.S. DOL Labor Condition Application disclosures downloaded; H-1B records parsed.',
  greenhouse_board: 'Greenhouse public job board polled; new postings ingested.',
  lever_postings: 'Lever public job postings polled; new postings ingested.',
  ashby_public: 'Ashby public job board polled; new postings ingested.',
  workable_jobs: 'Workable public job board polled; new postings ingested.',
  fred_api: 'St. Louis Fed FRED API polled; economic series ingested.',
  worldbank_api: 'World Bank API polled; macro indicators ingested.',
  abs_api: 'Australian Bureau of Statistics API polled; economic series ingested.',
  rba_api: 'Reserve Bank of Australia API polled; rate and macro series ingested.',
  aemo_nem: 'AEMO National Electricity Market data polled; market data ingested.',
  github_api: 'GitHub API polled; repository activity and releases ingested.',
  huggingface_api: 'Hugging Face API polled; model and dataset metadata ingested.'
};

// §3.3 frequency → human cadence
const FREQUENCY_LABELS = {
  daily: 'Checked daily',
  weekly: 'Checked weekly',
  monthly: 'Checked monthly',
  quarterly: 'Checked quarterly',
  annual: 'Checked annually',
  one_time: 'One-time ingest',
  on_event: 'Checked on event'
};

// §5 cadence → days (on_event omitted; status derivation skips it)
const CADENCE_DAYS = { daily:1, weekly:7, monthly:30, quarterly:90, annual:365 };

// extraction_method → workflow_dispatch target.
// Each workflow triggers the FULL batch for its extraction class — clicking
// 'Run extraction' on a web_extract source kicks off scan_sources for all
// due web sources. Per-source dispatch is a follow-on (needs script flags).
// Methods mapped to null have no automated workflow (manual / undetermined).
const METHOD_TO_WORKFLOW = {
  web_extract: 'daily-scan-sources.yml',
  pdf_export: 'daily-scan-sources.yml',
  podcast_scraper: 'weekly-podcasts.yml',
  rss_feed: 'daily-news.yml',
  ir_page_extract: 'daily-monitor-sources-adapters.yml',
  sec_edgar_scan: 'daily-monitor-sources-adapters.yml',
  iso_queue_ercot: 'daily-monitor-sources-adapters.yml',
  iso_queue_pjm: 'daily-monitor-sources-adapters.yml',
  iso_queue_caiso: 'daily-monitor-sources-adapters.yml',
  eia_api: 'daily-monitor-sources-adapters.yml',
  neso_tec: 'daily-monitor-sources-adapters.yml',
  epoch_frontier: 'daily-monitor-sources-adapters.yml',
  patentsview_search: 'daily-monitor-sources-adapters.yml',
  google_patents_bq: 'daily-monitor-sources-adapters.yml',
  epo_ops: 'daily-monitor-sources-adapters.yml',
  dol_lca_xlsx: 'daily-monitor-sources-adapters.yml',
  greenhouse_board: 'daily-monitor-sources-adapters.yml',
  lever_postings: 'daily-monitor-sources-adapters.yml',
  ashby_public: 'daily-monitor-sources-adapters.yml',
  workable_jobs: 'daily-monitor-sources-adapters.yml',
  fred_api: 'daily-monitor-sources-adapters.yml',
  worldbank_api: 'daily-monitor-sources-adapters.yml',
  abs_api: 'daily-monitor-sources-adapters.yml',
  rba_api: 'daily-monitor-sources-adapters.yml',
  aemo_nem: 'daily-monitor-sources-adapters.yml',
  github_api: 'daily-monitor-sources-adapters.yml',
  huggingface_api: 'daily-monitor-sources-adapters.yml',
  signal_scraper: 'daily-monitor-sources-adapters.yml',
  manual: null,
  manual_import: null,
  api: null,
  youtube_captions: null
};

function titleCaseToken(raw) {
  if (!raw) return '';
  return String(raw).replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function typeLabel(t) { return TYPE_LABELS[t] || titleCaseToken(t); }
function extractionDescription(m) { return EXTRACTION_DESCRIPTIONS[m] || titleCaseToken(m); }
function frequencyLabel(f) { return FREQUENCY_LABELS[f] || titleCaseToken(f); }

// §5 status derivation. Returns null for on_event (brief §6: no verdict).
function deriveStatus(src) {
  const freq = src.frequency;
  if (freq === 'on_event') return null;
  if (freq === 'one_time' || freq === 'annual') return { kind:'manual', label:'⏸ Manual', cls:'mon-status-manual' };
  if (!src.last_checked) return { kind:'never', label:'✗ Never', cls:'mon-status-never' };
  const days = CADENCE_DAYS[freq];
  if (!days) return null;
  const last = Date.parse(src.last_checked);
  if (isNaN(last)) return { kind:'never', label:'✗ Never', cls:'mon-status-never' };
  const ageDays = (Date.now() - last) / 86400000;
  if (ageDays <= days) return { kind:'healthy', label:'✓ Healthy', cls:'mon-status-healthy' };
  if (ageDays <= 1.5 * days) return { kind:'stale', label:'⚠ Stale', cls:'mon-status-stale' };
  return { kind:'overdue', label:'✗ Overdue', cls:'mon-status-overdue' };
}

let sources = [];
let vaultData = [];
let inboxItems = [];
let highlightId = null;
let activeTypes = new Set();
let typeCounts = {};

async function loadAll() {
  const params = new URLSearchParams(window.location.search);
  highlightId = params.get('highlight');

  // Initialize active type filter from URL
  const typesParam = params.get('types');
  if (typesParam) {
    typesParam.split(',').map(s => s.trim()).filter(Boolean).forEach(t => activeTypes.add(t));
  }

  const [registry, vault, inbox] = await Promise.all([
    loadJSON('sources-registry.json'),
    loadJSON('vault-data.json'),
    loadJSON('vault-inbox.json')
  ]);

  sources = (registry?.sources || []).filter(s => s.status !== 'deleted');
  vaultData = vault?.dataPoints || [];
  inboxItems = inbox?.items || [];

  // Compute type counts (total registry, AC#4 — never recomputed on chip toggle)
  typeCounts = {};
  sources.forEach(s => { typeCounts[s.type] = (typeCounts[s.type] || 0) + 1; });

  // Highlight override (§6 edge case): if highlighted source's type isn't in
  // the active filter, add it so the card is visible.
  if (highlightId && activeTypes.size > 0) {
    const target = sources.find(s => s.id === highlightId);
    if (target && !activeTypes.has(target.type)) {
      activeTypes.add(target.type);
    }
  }

  renderStats();
  renderChipRow();
  renderSources();

  // Auto-expand highlighted source
  if (highlightId) {
    setTimeout(() => {
      const el = document.getElementById('src-' + highlightId);
      if (el) {
        el.classList.add('expanded', 'highlighted');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 100);
  }
}

function syncUrl() {
  const params = new URLSearchParams(window.location.search);
  if (activeTypes.size === 0) {
    params.delete('types');
  } else {
    params.set('types', Array.from(activeTypes).join(','));
  }
  const qs = params.toString();
  const newUrl = window.location.pathname + (qs ? '?' + qs : '') + window.location.hash;
  history.replaceState(null, '', newUrl);
}

function renderChipRow() {
  const row = document.getElementById('chip-row');
  if (!row) return;
  const total = sources.length;
  const typeKeys = Object.keys(typeCounts).sort((a, b) => typeCounts[b] - typeCounts[a]);

  let html = '';
  // "All" chip — active when no types selected
  const allActive = activeTypes.size === 0;
  html += `<button class="chip${allActive ? ' active' : ''}" data-type="__all__" onclick="clearChips()">All <span class="chip-count">(${total})</span></button>`;
  typeKeys.forEach(t => {
    const active = activeTypes.has(t);
    const label = typeLabel(t);
    html += `<button class="chip${active ? ' active' : ''}" data-type="${esc(t)}" onclick="toggleChip('${esc(t)}')">${esc(label)} <span class="chip-count">(${typeCounts[t]})</span></button>`;
  });
  row.innerHTML = html;
}

function toggleChip(typeKey) {
  if (activeTypes.has(typeKey)) activeTypes.delete(typeKey);
  else activeTypes.add(typeKey);
  syncUrl();
  renderChipRow();
  renderSources();
}

function clearChips() {
  if (activeTypes.size === 0) return;
  activeTypes.clear();
  syncUrl();
  renderChipRow();
  renderSources();
}

async function loadJSON(path) {
  try {
    const r = await fetch(path + '?v=' + Date.now());
    if (r.ok) return await r.json();
  } catch(e) {}
  return null;
}

function getClaimsForSource(sourceId) {
  const accepted = vaultData.filter(dp => dp.source_id === sourceId);
  const pending = inboxItems.filter(i => i.source_id === sourceId && i.status === 'pending');
  return { accepted, pending };
}

function renderStats() {
  const totalSources = sources.length;
  const activeSources = sources.filter(s => s.status === 'active').length;
  const totalAccepted = vaultData.filter(dp => dp.source_id).length;
  const totalPending = inboxItems.filter(i => i.source_id && i.status === 'pending').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalSources}</div><div class="stat-label">Sources</div></div>
    <div class="stat-card"><div class="stat-value">${activeSources}</div><div class="stat-label">Active</div></div>
    <div class="stat-card"><div class="stat-value">${totalAccepted}</div><div class="stat-label">Accepted Claims</div></div>
    <div class="stat-card"><div class="stat-value">${totalPending}</div><div class="stat-label">Pending Review</div></div>
  `;
}

function renderSources() {
  const query = (document.getElementById('search')?.value || '').toLowerCase();

  // Chip filter (AC#2, AC#5): OR within types, AND with search.
  let filtered = sources;
  if (activeTypes.size > 0) {
    filtered = filtered.filter(s => activeTypes.has(s.type));
  }
  if (query) {
    filtered = filtered.filter(s =>
      s.title.toLowerCase().includes(query) ||
      s.url.toLowerCase().includes(query) ||
      (s.organization || '').toLowerCase().includes(query) ||
      (s.author || '').toLowerCase().includes(query) ||
      (s.tags || []).some(t => t.toLowerCase().includes(query))
    );
  }

  if (filtered.length === 0) {
    document.getElementById('sources-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">No sources match your search.</div>';
    return;
  }

  // Sort: active first, then by last_claims_count desc
  filtered.sort((a, b) => {
    if (a.status === 'active' && b.status !== 'active') return -1;
    if (b.status === 'active' && a.status !== 'active') return 1;
    return (b.last_claims_count || 0) - (a.last_claims_count || 0);
  });

  let html = '';
  filtered.forEach(src => {
    const { accepted, pending } = getClaimsForSource(src.id);
    const totalClaims = accepted.length + pending.length;
    const isHighlighted = src.id === highlightId;

    html += '<div class="source-card' + (isHighlighted ? ' expanded highlighted' : '') + '" id="src-' + src.id + '" onclick="toggleSource(this)">';

    // Header
    html += '<div class="source-header">';
    html += '<div>';
    html += '<div class="source-title">' + esc(src.title) + '</div>';
    if (src.author || src.organization) {
      html += '<div class="source-org">' + esc([src.author, src.organization].filter(Boolean).join(' — ')) + '</div>';
    }
    if (src.url) {
      html += '<a class="source-url-small" href="' + esc(src.url) + '" target="_blank" onclick="event.stopPropagation()">' + esc(src.url.replace(/^https?:\/\//, '').substring(0, 60)) + '</a>';
    }
    html += '</div>';

    html += '<div class="source-badges">';
    html += '<span class="badge badge-' + src.status + '">' + (src.status === 'active' ? 'Active' : 'Pending') + '</span>';
    html += '<span class="badge badge-type">' + esc(typeLabel(src.type)) + '</span>';
    if (totalClaims > 0) html += '<span class="badge badge-claims">' + totalClaims + ' claims</span>';

    // Review pending — only when there's something to review
    if (pending.length > 0) {
      html += '<a class="card-action card-action-review" href="review.html?source=' + esc(src.id) + '" onclick="event.stopPropagation()" title="Review ' + pending.length + ' pending claim' + (pending.length > 1 ? 's' : '') + ' from this source">Review (' + pending.length + ')</a>';
    }

    // Run extraction — only when there's a workflow target and source is active-ish
    const wf = METHOD_TO_WORKFLOW[src.extraction_method];
    const canExtract = !!wf && src.status !== 'deferred';
    if (canExtract) {
      html += '<button class="card-action card-action-extract" onclick="event.stopPropagation();runExtraction(\'' + src.id + '\')" title="Trigger ' + esc(wf) + ' on GitHub Actions">Run extraction</button>';
    }

    html += '<button class="card-action card-action-delete" onclick="event.stopPropagation();deleteSource(\'' + src.id + '\',\'' + esc(src.title).replace(/'/g,'\\\'') + '\')">Delete</button>';
    html += '</div></div>';

    // Tags
    if (src.tags && src.tags.length > 0) {
      html += '<div class="source-tags">';
      src.tags.forEach(t => html += '<span class="source-tag">' + esc(t) + '</span>');
      html += '</div>';
    }

    // Monitoring block (AC#6 — always visible, not gated behind expand)
    const status = deriveStatus(src);
    const datesBits = [];
    if (src.last_checked) datesBits.push('Last: ' + esc(src.last_checked));
    if (src.next_check && src.next_check < '2100') datesBits.push('Next: ' + esc(src.next_check));
    html += '<div class="monitoring-block">';
    html += '<div class="mon-row"><div class="mon-label">Process</div><div class="mon-value">' + esc(extractionDescription(src.extraction_method)) + '</div></div>';
    html += '<div class="mon-row"><div class="mon-label">Cadence</div><div class="mon-value">' + esc(frequencyLabel(src.frequency)) + '</div></div>';
    if (status) {
      html += '<div class="mon-row"><div class="mon-label">Status</div><div class="mon-value"><span class="mon-status ' + status.cls + '">' + esc(status.label) + '</span>';
      if (datesBits.length) html += '<span class="mon-dates">' + datesBits.join(' · ') + '</span>';
      html += '</div></div>';
    } else if (datesBits.length) {
      html += '<div class="mon-row"><div class="mon-label">Dates</div><div class="mon-value mon-dates" style="margin-left:0;">' + datesBits.join(' · ') + '</div></div>';
    }
    html += '</div>';

    // Expandable detail — linked claims
    html += '<div class="source-detail">';

    if (accepted.length > 0) {
      html += '<div class="claims-section-title">Accepted Data Points (' + accepted.length + ')</div>';
      accepted.forEach(dp => {
        html += '<div class="linked-claim">';
        html += '<div class="lc-claim">' + esc(dp.claim) + '</div>';
        html += '<div class="lc-meta">';
        html += '<span class="lc-value">' + (dp.value != null ? dp.value + ' ' + (dp.unit || '') : '') + '</span>';
        html += ' · ' + esc(dp.sourceAuthor || '');
        html += ' · ' + esc(dp.dateOfClaim || '');
        html += ' · <span class="lc-status lc-accepted">accepted</span>';
        html += ' · Used on: ' + (dp.usedOn || []).join(', ');
        html += '</div></div>';
      });
    }

    if (pending.length > 0) {
      html += '<div class="claims-section-title" style="margin-top:16px;">Pending Review (' + pending.length + ')</div>';
      pending.forEach(item => {
        html += '<div class="linked-claim">';
        html += '<div class="lc-claim">' + esc(item.claim) + '</div>';
        html += '<div class="lc-meta">';
        html += '<span class="lc-value">' + (item.value != null ? item.value + ' ' + (item.unit || '') : '') + '</span>';
        html += ' · ' + esc(item.sourceAuthor || '');
        html += ' · ' + esc(item.dateOfClaim || '');
        html += ' · <span class="lc-status lc-pending">pending</span>';
        if (item.replaces) html += ' · replaces ' + esc(item.replaces);
        html += '</div></div>';
      });
      html += '<a href="review.html" style="display:inline-block;margin-top:8px;font-size:11px;color:var(--accent);text-decoration:none;" onclick="event.stopPropagation()">Review these items →</a>';
    }

    if (totalClaims === 0) {
      html += '<div class="no-claims">No claims extracted from this source yet.</div>';
    }

    html += '</div>'; // source-detail
    html += '</div>'; // source-card
  });

  document.getElementById('sources-list').innerHTML = html;
}

function toggleSource(el) {
  el.classList.toggle('expanded');
}

function quickAdd() {
  const input = document.getElementById('quick-add-url');
  const url = (input.value || '').trim();
  if (!url) return;

  // Auto-classify
  let type = 'web_page';
  let extraction = 'web_extract';
  let freq = 'one_time';

  if (url.includes('docs.google.com/presentation')) { type = 'slide_deck'; extraction = 'pdf_export'; freq = 'annual'; }
  else if (url.endsWith('.pdf')) { type = 'pdf'; extraction = 'pdf_export'; freq = 'one_time'; }
  else if (url.includes('substack.com')) { type = 'rss_feed'; extraction = 'web_extract'; freq = 'weekly'; }
  else if (url.includes('youtube.com/watch')) { type = 'video'; extraction = 'youtube_captions'; freq = 'one_time'; }
  else if (url.includes('sec.gov')) { type = 'sec_filing'; extraction = 'web_extract'; freq = 'quarterly'; }
  else if (url.includes('github.com') && url.split('/').length >= 5) { type = 'github_repo'; extraction = 'api'; freq = 'weekly'; }
  else if (url.includes('/feed') || url.includes('/rss') || url.includes('feeds.')) { type = 'rss_feed'; extraction = 'podcast_scraper'; freq = 'weekly'; }

  const newSource = {
    id: 'src-' + String(sources.length + 1).padStart(3, '0'),
    url: url,
    title: new URL(url).hostname.replace('www.', ''),
    type: type,
    author: '',
    organization: '',
    added: new Date().toISOString().split('T')[0],
    tags: [],
    extraction_method: extraction,
    frequency: freq,
    next_check: new Date().toISOString().split('T')[0],
    last_checked: null,
    last_claims_count: 0,
    status: 'pending_first_extraction'
  };

  sources.push(newSource);
  input.value = '';
  renderStats();
  renderSources();
  showToast('Source added: ' + newSource.title + ' (type: ' + type + ', freq: ' + freq + ')');

  // Save to localStorage as pending addition
  const pendingSources = JSON.parse(localStorage.getItem('pending-source-additions') || '[]');
  pendingSources.push(newSource);
  localStorage.setItem('pending-source-additions', JSON.stringify(pendingSources));
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

async function runExtraction(sourceId) {
  const src = sources.find(s => s.id === sourceId);
  if (!src) return;
  const wf = METHOD_TO_WORKFLOW[src.extraction_method];
  if (!wf) { alert('No automated workflow runs sources with method: ' + src.extraction_method); return; }
  if (typeof GitHubAPI === 'undefined' || !GitHubAPI.hasToken()) {
    alert('GitHub token not set — go to Settings tab first');
    return;
  }
  const label = src.title || sourceId;
  if (!confirm('Trigger "' + wf + '" on GitHub Actions?\n\nThis kicks off the whole batch for ' + src.extraction_method + ' sources, not just "' + label + '". It will pick up "' + label + '" if it is due.\n\nContinue?')) return;
  try {
    const ok = await GitHubAPI.triggerWorkflow(wf);
    if (ok) {
      showToast('Triggered ' + wf + ' — ' + label + ' refreshes on its next eligible cycle');
    } else {
      alert('Workflow dispatch failed. Check the token has actions:write scope and the workflow file is on the default branch.');
    }
  } catch (e) {
    alert('Error triggering workflow: ' + e.message);
  }
}

async function deleteSource(sourceId, sourceTitle) {
  if (!confirm('Delete source "' + sourceTitle + '"? This will mark it as inactive.')) return;
  if (typeof GitHubAPI === 'undefined' || !GitHubAPI.hasToken()) {
    alert('GitHub token not set — go to Settings tab first');
    return;
  }
  try {
    const regFile = await GitHubAPI.readFile('sources-registry.json');
    const registry = JSON.parse(regFile.content);
    const source = registry.sources.find(s => s.id === sourceId);
    if (source) {
      source.status = 'deleted';
      await GitHubAPI.commitFiles(
        [{ path: 'sources-registry.json', content: registry }],
        'Delete source: ' + sourceTitle
      );
      // Remove from local array and re-render
      sources = sources.filter(s => s.id !== sourceId);
      renderSources();
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

loadAll();
