name: Weekly Podcast Transcript Scrape

on:
  schedule:
    - cron: '17 0 * * 3'  # Wednesday 10:17am AEST (UTC+10)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-podcasts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install youtube-transcript-api

      - name: Scrape podcast transcripts
        run: python scripts/scrape_podcasts.py --limit 5

      - name: Commit new transcripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          git diff --cached --quiet || git commit -m "Podcast transcripts: $(date +%Y-%m-%d)"
          git push
