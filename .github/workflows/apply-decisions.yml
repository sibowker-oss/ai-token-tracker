name: Apply Review Decisions

on:
  push:
    branches: [main]
    paths:
      - 'data-updates/review-decisions-*.json'
      - 'beta/data-updates/review-decisions-*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Apply decisions
        env:
          RUN_TRIGGER: github_action
        run: python scripts/apply_decisions.py

      - name: Regenerate site-data.json
        run: python scripts/generate_site_data.py

      - name: Derive layer-stack ratios (wq-102)
        # Adds gross-anchored ratios (capex/usage/compute/power × Apps
        # Revenue gross) and the usage notional figure to
        # site-data.compute.layer_stack_ratios. Required before
        # render_numbers.py so the homepage hero pill ratios resolve.
        run: python scripts/derive_layer_stack_ratios.py

      - name: Re-render bound numbers (wq-102)
        # Refreshes value substitutions in /beta/*.html priority pages
        # against the just-regenerated site-data.json + entities.json.
        # Idempotent — no-op when no resolved value moved since last build.
        run: python scripts/render_numbers.py

      - name: Regenerate feed data
        run: python scripts/generate_feed.py

      - name: Archive processed decisions
        run: |
          mkdir -p data-updates/archive beta/data-updates/archive
          mv data-updates/review-decisions-*.json data-updates/archive/ 2>/dev/null || true
          mv beta/data-updates/review-decisions-*.json beta/data-updates/archive/ 2>/dev/null || true

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data-updates/ beta/ entities.json vault-data.json vault-inbox.json site-data.json sources-registry.json feed-data.json data/runs.jsonl
          git diff --cached --quiet || git commit -m "Auto-apply review decisions $(date +%Y-%m-%d)"
          git push
