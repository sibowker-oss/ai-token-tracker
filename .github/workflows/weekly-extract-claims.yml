name: Weekly Claim Extraction + Auto-PR

on:
  schedule:
    - cron: '47 0 * * 3'  # Wednesday 10:47am AEST (UTC+10)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  extract-claims:
    runs-on: ubuntu-latest
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install anthropic youtube-transcript-api

      - name: Extract claims from transcripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_TRIGGER: github_action
        run: python scripts/extract_claims.py --auto-pr

      - name: Commit candidates if no PR created
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-updates/ data/runs.jsonl
          git diff --cached --quiet || git commit -m "Claim candidates: $(date +%Y-%m-%d)"
          git push
