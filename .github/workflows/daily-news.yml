name: Daily News Monitor

on:
  schedule:
    - cron: '7 22 * * *'  # 8:07am AEST (UTC+10)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news-monitor:
    runs-on: ubuntu-latest
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Run news monitor
        env:
          RUN_TRIGGER: github_action
        run: python scripts/news_monitor.py

      - name: Commit alerts if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_alerts.json data/runs.jsonl
          git diff --cached --quiet || git commit -m "News alerts: $(date +%Y-%m-%d)"
          git push
