name: Daily Source Scan

on:
  schedule:
    - cron: '0 22 * * *'  # 8:00am AEST (UTC+10)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install anthropic

      - name: Scan sources for new claims
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scan_sources.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault-inbox.json sources-registry.json
          git diff --cached --quiet || git commit -m "Vault scan: $(python3 -c "import json; d=json.load(open('vault-inbox.json')); print(len([i for i in d['items'] if i['status']=='pending']), 'pending claims')")"
          git push
