name: Daily Vault URL Enrichment

on:
  schedule:
    - cron: '3 1 * * *'  # 11:03am AEST (UTC+10)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich-vault:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install anthropic

      - name: Enrich pending vault entries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/enrich_vault.py

      - name: Commit enriched entries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault-data.json
          git diff --cached --quiet || git commit -m "Vault enrichment: $(date +%Y-%m-%d)"
          git push
