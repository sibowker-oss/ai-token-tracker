name: Monthly Anthropic Review

# wq-079 — generate monthly Anthropic spotlight report on the 1st of each month.
# Output committed back to repo as data/anthropic-monthly-YYYY-MM.md.
# Cron is in UTC; 00:00 UTC on the 1st is 10am AEST (UTC+10) on the 1st.

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monthly-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monthly Anthropic review
        run: python3 scripts/anthropic_monthly_review.py

      - name: Commit report (if changed)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/anthropic-monthly-*.md
          if git diff --cached --quiet; then
            echo "No changes — report is already up to date."
          else
            ym=$(date +%Y-%m)
            git commit -m "report(anthropic-spotlight): monthly review for ${ym} (wq-079)"
            git push
          fi
