<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Command Centre — AI Ledger</title>
<script>
(function() {
  // wq-088 OQ-1 — /admin.html redirects to /review.html. If the user lands here
  // with a hash like #telemetry from an old bookmark, forward to that admin tab.
  // The HASH_MAP must stay in sync with the data-tab values in
  // design-system/components/admin-nav.html.
  const HASH_MAP = {
    review: '/review.html',
    claims: '/claims.html',
    add: '/add.html',
    ask: '/ask.html',
    sources: '/sources.html',
    confidence: '/confidence.html',
    vault: '/vault.html',
    anthropic: '/anthropic-spotlight.html',
    status: '/status.html',
    telemetry: '/telemetry.html',
    agents: '/agents.html',
    briefs: '/briefs.html',
    dev: '/in-development.html',
    archive: '/archive.html',
    settings: '/settings.html'
  };
  const hash = (window.location.hash || '').replace(/^#/, '').toLowerCase();
  const target = HASH_MAP[hash] || '/review.html';
  window.location.replace(target);
})();
</script>
<meta http-equiv="refresh" content="0; url=/review.html">
<link rel="canonical" href="/review.html">
<style>
  body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#0a0e1a; color:#cbd5e1; padding:48px 24px; }
  a { color:#3b82f6; }
</style>
</head>
<body>
<p>The Command Centre lives at the admin pages now. Redirecting to <a href="/review.html">the Inbox</a>…</p>
</body>
